<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Evaluación de Química Orgánica - PSM</title>
    <style>
        :root { --psm-blue: #003366; --psm-gold: #b8860b; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 10px solid var(--psm-blue); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; }
        .option { border: 2px solid #eee; padding: 15px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .option:hover { border-color: var(--psm-gold); background: #fffdf0; }
        .option img { max-width: 100%; height: auto; border-radius: 4px; }
        .selected { border-color: var(--psm-blue) !important; background: #e3f2fd !important; border-width: 3px !important; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .btn-send { background: #28a745; color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1.1rem; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Examen de Isomería y Estereoquímica</h2>
    <p><b>Prof. José Ángel Caldera</b></p>

    <input type="text" id="student_name" placeholder="Nombre y Apellido">
    <input type="text" id="student_id" placeholder="Cédula">

    <div style="background: #fff9c4; padding: 15px; border-radius: 6px; text-align: left; margin: 20px 0;">
        <strong>Pregunta:</strong> Seleccione la estructura que representa correctamente al <b>(S)-2-butanol</b>.
    </div>

    <div class="grid">
        <div class="option" onclick="seleccionar(this, 'A')">
            <b>Opción A</b><br>
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e2/%28S%29-butan-2-ol_Structural_Formulae.png/200px-%28S%29-butan-2-ol_Structural_Formulae.png" alt="Estructura A">
        </div>
        <div class="option" onclick="seleccionar(this, 'B')">
            <b>Opción B</b><br>
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/71/%28R%29-butan-2-ol_Structural_Formulae.png/200px-%28R%29-butan-2-ol_Structural_Formulae.png" alt="Estructura B">
        </div>
    </div>

    <button class="btn-send" onclick="enviarExamen()">✅ Enviar Respuesta Final</button>
    <p id="status" style="margin-top:15px; font-weight:bold;"></p>
</div>

<script>
    let seleccionEstudiante = "";

    function seleccionar(elemento, valor) {
        document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
        elemento.classList.add('selected');
        seleccionEstudiante = valor;
    }

    function enviarExamen() {
        const name = document.getElementById('student_name').value;
        const id = document.getElementById('student_id').value;

        if (!name || !id || !seleccionEstudiante) {
            alert("Por favor, complete sus datos y seleccione una opción.");
            return;
        }

        const scriptURL = 'https://script.google.com/macros/s/AKfycbwPsysDh255aIdyonjBX1SvGqQG9lNJzXH__Is_aJ_wWeikxdFpIkG0ryFg2QCQJF3E4g/exec';

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({
                id: id,
                name: name,
                type: "EXAMEN_OPCION_MULTIPLE",
                respuestaSeleccionada: seleccionEstudiante,
                preguntaCorrecta: "A"
            })
        });

        document.getElementById('status').innerText = "✅ Respuesta enviada satisfactoriamente.";
        document.getElementById('status').style.color = "green";
        alert("Su evaluación ha sido registrada.");
    }
</script>

</body>
</html>
