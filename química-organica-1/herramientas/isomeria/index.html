<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación de Isomería y Estereoquímica - PSM</title>
    <script type="text/javascript" src="https://jsme-editor.github.io/dist/jsme/jsme.nocache.js"></script>
    <style>
        :root { --psm-blue: #003366; --psm-gold: #b8860b; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 10px solid var(--psm-blue); }
        .header { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        .question-box { background: #fafafa; padding: 20px; border-left: 5px solid var(--psm-gold); margin-bottom: 20px; border-radius: 4px; }
        .btn { padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-draw { background: var(--psm-blue); color: white; }
        .btn-send { background: #28a745; color: white; width: 100%; font-size: 1.1rem; margin-top: 20px; }
        .status-tag { display: inline-block; margin-top: 10px; font-size: 0.9rem; font-weight: bold; color: #666; }
        #modalEditor { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; }
        .modal-content { background: white; width: 95%; max-width: 550px; margin: 50px auto; padding: 20px; border-radius: 8px; text-align: center; }
        #jsme_container { margin: 10px auto; }
        input[readonly] { background-color: #eee !important; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Evaluación de Isomería y Estereoquímica</h2>
        <p>I.U.P. "Santiago Mariño" - Prof. José Ángel Caldera</p>
    </div>

    <div class="question-box">
        <label><b>Nombre y Apellido:</b></label>
        <input type="text" id="student_name" style="width:100%; padding:8px; margin-bottom:10px; box-sizing: border-box;">
        <label><b>Cédula de Identidad:</b></label>
        <input type="text" id="student_id" style="width:100%; padding:8px; box-sizing: border-box;">
    </div>

    <div class="question-box">
        <p><strong>Pregunta 1:</strong> Dibuje la estructura del <strong>(S)-2-butanol</strong> indicando correctamente la estereoquímica en el centro quiral.</p>
        
        <button class="btn btn-draw" onclick="abrirEditor('Q1', '(S)-2-butanol')">🎨 Dibujar Estructura</button>
        
        <div style="margin-top:15px;">
            <label style="font-size:0.8rem; color:#666;">Código Estructural Generado (SMILES):</label>
            <input type="text" id="smiles_res_Q1" readonly 
                   style="width:100%; border:1px solid #ccc; font-family:monospace; padding:8px; font-size:0.9rem; margin-top:5px;" 
                   placeholder="El código aparecerá aquí al guardar...">
        </div>
        
        <div id="status_Q1" class="status-tag">⚠️ Esperando dibujo...</div>
    </div>

    <button class="btn btn-send" onclick="window.print()">GENERAR PDF DE RESPALDO (FINALIZAR)</button>
</div>

<div id="modalEditor">
    <div class="modal-content">
        <h3 id="instruccion_pregunta">Editor Molecular</h3>
        <div id="jsme_container"></div>
        <br>
        <button class="btn" style="background:#28a745; color:white;" onclick="capturarSmiles()">✅ Guardar y Enviar</button>
        <button class="btn" style="background:#666; color:white;" onclick="cerrarEditor()">Cancelar</button>
    </div>
</div>

<script>
    let jsmeApplet;
    let currentTag = '';
    let currentTargetName = '';
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwPsysDh255aIdyonjBX1SvGqQG9lNJzXH__Is_aJ_wWeikxdFpIkG0ryFg2QCQJF3E4g/exec';

    function jsmeOnLoad() {
        // Inicializa el editor con opciones para estereoquímica
        jsmeApplet = new JSME.Jsme("jsme_container", "500px", "400px", {
            "options" : "query,hydrogens"
        });
    }

    function abrirEditor(tag, nombreMolecula) {
        // Validar que el estudiante puso sus datos antes de dibujar
        const id = document.getElementById('student_id').value;
        const name = document.getElementById('student_name').value;
        if (!id || !name) {
            alert("Por favor, ingrese su nombre y cédula antes de comenzar a dibujar.");
            return;
        }

        currentTag = tag;
        currentTargetName = nombreMolecula;
        document.getElementById('instruccion_pregunta').innerText = "Dibujando: " + nombreMolecula;
        document.getElementById('modalEditor').style.display = 'block';
    }

    function cerrarEditor() {
        document.getElementById('modalEditor').style.display = 'none';
    }

    async function capturarSmiles() {
        const smiles = jsmeApplet.smiles(); 
        const id = document.getElementById('student_id').value;
        const name = document.getElementById('student_name').value;

        if (smiles) {
            // 1. Mostrar el SMILES en el cuadro de texto (Código N°2 integrado)
            document.getElementById('smiles_res_' + currentTag).value = smiles;

            const statusDiv = document.getElementById('status_' + currentTag);
            statusDiv.innerText = "⏳ Enviando respuesta a la nube...";
            statusDiv.style.color = "orange";

            // 2. Enviar datos al Apps Script
            const payload = {
                id: id,
                name: name,
                type: "EVALUACION_SMILES",
                preguntaCorrecta: currentTargetName,
                smiles: smiles
            };

            try {
                // Envío tipo "Fire and forget" para evitar problemas de red lentos
                fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });

                statusDiv.innerText = "✅ Estructura enviada con éxito";
                statusDiv.style.color = "#28a745";
                cerrarEditor();
            } catch (e) {
                statusDiv.innerText = "❌ Error al conectar con el servidor";
                statusDiv.style.color = "red";
            }
        } else {
            alert("El editor está vacío. Por favor dibuje la estructura.");
        }
    }
</script>

</body>
</html>
