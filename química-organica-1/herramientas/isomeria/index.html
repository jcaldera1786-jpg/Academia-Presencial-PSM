<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación de Isomería - PSM</title>
    <script type="text/javascript" src="https://jsme-editor.github.io/dist/jsme/jsme.nocache.js"></script>
    <style>
        :root { --psm-blue: #003366; --psm-gold: #b8860b; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 10px solid var(--psm-blue); }
        .header { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        .question-box { background: #fafafa; padding: 20px; border-left: 5px solid var(--psm-gold); margin-bottom: 20px; border-radius: 4px; }
        
        /* Contenedor del Editor Incrustado */
        #jsme_container { 
            width: 100%; 
            max-width: 600px; 
            height: 450px; 
            margin: 20px auto; 
            border: 2px solid #ccc;
            background: white;
        }
        
        .btn { padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; width: 100%; }
        .btn-save { background: #28a745; color: white; margin-top: 10px; font-size: 1.1rem; }
        .status-tag { display: block; margin-top: 15px; font-size: 1rem; font-weight: bold; text-align: center; }
        input { width: 100%; padding: 10px; margin: 5px 0 15px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        input[readonly] { background-color: #e9ecef; color: #495057; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Evaluación de Química Orgánica I</h2>
        <p>I.U.P. "Santiago Mariño" - Prof. José Ángel Caldera</p>
    </div>

    <div class="question-box">
        <label><b>Nombre y Apellido:</b></label>
        <input type="text" id="student_name" placeholder="Ej: José Caldera">
        <label><b>Cédula de Identidad:</b></label>
        <input type="text" id="student_id" placeholder="Ej: 11282631">
    </div>

    <div class="question-box">
        <p><strong>Problema de Isomería:</strong> Dibuje la estructura del <strong>(S)-2-butanol</strong>. Asegúrese de indicar la estereoquímica correcta en el centro quiral utilizando las herramientas de cuña.</p>
        
        <div id="jsme_container"></div>

        <button class="btn btn-save" onclick="enviarYGuardar()">✅ Guardar Dibujo y Enviar a Revisión</button>
        
        <div style="margin-top:20px;">
            <label style="font-size:0.8rem; color:#666;">Registro de estructura (SMILES):</label>
            <input type="text" id="smiles_output" readonly placeholder="El código aparecerá aquí al enviar...">
        </div>
        
        <div id="status_msg" class="status-tag" style="color: #666;">⚠️ Esperando dibujo del estudiante...</div>
    </div>

    <button class="btn" style="background:var(--psm-blue); color:white; margin-top:30px;" onclick="window.print()">FINALIZAR Y GENERAR PDF</button>
</div>

<script>
    let jsmeApplet;
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwPsysDh255aIdyonjBX1SvGqQG9lNJzXH__Is_aJ_wWeikxdFpIkG0ryFg2QCQJF3E4g/exec';

    // Se ejecuta automáticamente al cargar la página
    function jsmeOnLoad() {
        jsmeApplet = new JSME.Jsme("jsme_container", "100%", "450px", {
            "options" : "query,hydrogens,stereo,nocanonize"
        });
    }

    async function enviarYGuardar() {
        const name = document.getElementById('student_name').value;
        const id = document.getElementById('student_id').value;
        const smiles = jsmeApplet.smiles();

        if (!name || !id) {
            alert("Por favor, ingrese sus datos personales.");
            return;
        }

        if (!smiles) {
            alert("El lienzo está vacío. Dibuje la estructura solicitada.");
            return;
        }

        // Mostrar SMILES en pantalla
        document.getElementById('smiles_output').value = smiles;
        const status = document.getElementById('status_msg');
        status.innerText = "⏳ Enviando a la IA del Profesor...";
        status.style.color = "orange";

        const payload = {
            id: id,
            name: name,
            type: "EVALUACION_SMILES",
            preguntaCorrecta: "(S)-2-butanol",
            smiles: smiles
        };

        try {
            // Envío directo al Apps Script
            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });

            status.innerText = "✅ ¡Estructura recibida y calificada con éxito!";
            status.style.color = "#28a745";
            
            // Bloquear campos para evitar cambios post-envío si deseas
            // alert("Respuesta enviada. Puede generar su PDF.");

        } catch (e) {
            status.innerText = "❌ Error de conexión. Intente de nuevo.";
            status.style.color = "red";
        }
    }
</script>

</body>
</html>
