<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Evaluación de Isomería - PSM</title>
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/kekule/dist/themes/default/kekule.css" />
    <script src="https://unpkg.com/kekule/dist/kekule.js?modules=chemWidget,algorithm"></script>
    
    <style>
        :root { --psm-blue: #003366; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 10px; border-top: 10px solid var(--psm-blue); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #composer { width: 100%; height: 450px; border: 1px solid #ccc; margin: 15px 0; }
        .btn { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <h2>Examen de Química Orgánica I</h2>
    <p>I.U.P. "Santiago Mariño" - Prof. José Ángel Caldera</p>

    <input type="text" id="student_name" placeholder="Nombre del Estudiante">
    <input type="text" id="student_id" placeholder="Cédula de Identidad">

    <div style="background: #e3f2fd; padding: 15px; border-radius: 5px;">
        <strong>Instrucción:</strong> Dibuje la estructura del <b>(S)-2-butanol</b> usando el editor inferior.
    </div>

    <div id="composer" data-widget="Kekule.ChemWidget.Composer" data-chem-obj=""></div>

    <button class="btn" onclick="enviarExamen()">✅ Enviar Respuesta a la Nube</button>
    <p id="status" style="text-align: center; font-weight: bold; margin-top: 10px;"></p>
</div>

<script>
    let composer;

    // Inicializar el editor cuando la librería esté lista
    Kekule.X.domReady(() => {
        composer = Kekule.Widget.getWidgetById('composer');
        // Configuración para que sea fácil de usar
        composer.setCommonToolButtons(['erase', 'bond', 'atom', 'ring', 'charge']);
    });

    async function enviarExamen() {
        const chemObj = composer.getChemObj();
        // Convertimos el dibujo a SMILES
        const smiles = Kekule.IO.saveFormatData(chemObj, 'smi');
        const name = document.getElementById('student_name').value;
        const id = document.getElementById('student_id').value;

        if (!smiles || smiles === "" || !name || !id) {
            alert("Por favor, complete sus datos y dibuje la estructura.");
            return;
        }

        const status = document.getElementById('status');
        status.innerText = "⏳ Enviando datos...";
        status.style.color = "orange";

        const scriptURL = 'https://script.google.com/macros/s/AKfycbwPsysDh255aIdyonjBX1SvGqQG9lNJzXH__Is_aJ_wWeikxdFpIkG0ryFg2QCQJF3E4g/exec';

        try {
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    id: id,
                    name: name,
                    type: "EVALUACION_SMILES",
                    preguntaCorrecta: "(S)-2-butanol",
                    smiles: smiles
                })
            });
            status.innerText = "✅ ¡Enviado con éxito! Puede cerrar la página.";
            status.style.color = "green";
        } catch (e) {
            status.innerText = "❌ Error al enviar. Revise su conexión.";
            status.style.color = "red";
        }
    }
</script>

</body>
</html>
