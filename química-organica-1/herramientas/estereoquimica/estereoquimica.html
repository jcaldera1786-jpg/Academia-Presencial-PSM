<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zuforca Academy - Estereoquímica PRO</title>
    <style>
        :root { --primary: #1a5276; --secondary: #2471a3; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; }
        .container { background: white; width: 90%; max-width: 600px; margin-top: 20px; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        img { max-width: 100%; height: auto; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 15px; min-height: 200px; }
        input[type="text"] { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: var(--secondary); }
        #feedback { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; text-align: left; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; display: none; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h2>Evaluador Inteligente de Orgánica</h2>
    <p>Identifica el nombre IUPAC (Incluye R/S)</p>
    
    <div id="quiz-area">
        <img id="mol-img" src="" alt="Cargando molécula...">
        <input type="text" id="user-answer" placeholder="Escribe el nombre aquí..." autocomplete="off">
        <div class="loader" id="loader"></div>
        <button onclick="enviarRespuesta()" id="btn-enviar">Verificar con IA</button>
    </div>

    <div id="feedback"></div>
    <button id="btn-next" style="display:none; margin-top:15px;" onclick="siguientePregunta()">Siguiente Estructura</button>
</div>

<script>
    // 1. URL DE TU SCRIPT (Enlace /exec)
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxixP903rVHlimkBB_ExvjK7dk5vjSUzn_PGeBif1XUE19oHmevy87FdvDm0t_EUeEBBA/exec";
    
    // 2. BANCO DE DATOS (Nivel Iniciación)
    const examen = [
        { cid: "637567", c: "(S)-2-bromobutano" },
        { cid: "637568", c: "(R)-2-bromopentano" },
        { cid: "11242",  c: "2-cloropropano" },
        { cid: "3350",   c: "(S)-2-clorobutano" },
        { cid: "3351",   c: "(R)-2-clorobutano" },
        { cid: "5366432", c: "(R)-3-cloropentano" },
        { cid: "11619",  c: "2-yodopropano" },
        { cid: "11234",  c: "1-clorobutano" }
    ];

    let qIdx = 0;
    let nombreUsuario = "";
    let cedulaUsuario = "";

    window.onload = () => {
        nombreUsuario = prompt("Nombre Completo:");
        cedulaUsuario = prompt("Cédula:");
        if(!nombreUsuario || !cedulaUsuario) {
            alert("Los datos son obligatorios.");
            location.reload();
        }
        cargarPregunta();
    };

    function cargarPregunta() {
        const p = examen[qIdx];
        document.getElementById('mol-img').src = `https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/cid/${p.cid}/PNG?record_type=2d&image_size=large`;
        document.getElementById('user-answer').value = "";
        document.getElementById('feedback').style.display = "none";
        document.getElementById('btn-next').style.display = "none";
        document.getElementById('btn-enviar').disabled = false;
        document.getElementById('user-answer').focus();
    }

    async function enviarRespuesta() {
        const respuestaAlumno = document.getElementById('user-answer').value.trim();
        if(!respuestaAlumno) return alert("Escribe el nombre de la estructura.");

        document.getElementById('loader').style.display = "block";
        document.getElementById('btn-enviar').disabled = true;

        const payload = {
            nombre: nombreUsuario,
            cedula: cedulaUsuario,
            respuestaAlumno: respuestaAlumno,
            respuestaCorrecta: examen[qIdx].c,
            idPregunta: `CID: ${examen[qIdx].cid}`,
            intento: 1
        };

        try {
            // Enviamos los datos al Apps Script
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });

            // Feedback visual de éxito
            const fb = document.getElementById('feedback');
            fb.innerHTML = `
                <div style="background:#d4edda; color:#155724; padding:10px; border-radius:8px; border: 1px solid #c3e6cb;">
                    <b>✅ Enviado con éxito.</b><br>
                    Tu respuesta se registró en el sistema. La IA evaluará la precisión química en la hoja del profesor.
                </div>`;
            fb.style.display = "block";
            document.getElementById('btn-next').style.display = "inline-block";
        } catch (e) {
            alert("Error al conectar con el servidor.");
            document.getElementById('btn-enviar').disabled = false;
        } finally {
            document.getElementById('loader').style.display = "none";
        }
    }

    function siguientePregunta() {
        qIdx++;
        if(qIdx < examen.length) {
            cargarPregunta();
        } else {
            alert("¡Felicidades! Has terminado el reto de estereoquímica.");
            location.reload();
        }
    }
</script>
</body>
</html>
