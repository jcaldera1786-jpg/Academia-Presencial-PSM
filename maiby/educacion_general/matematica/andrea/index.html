<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Súper Reto - Andrea</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --p: #6c5ce7; --s: #2ed573; --accent: #ffa502; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #4834d4; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        
        .card { 
            background: white; padding: 2.5rem; border-radius: 30px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.3); width: 90%; max-width: 420px; 
            text-align: center; border: 5px solid #686de0; position: relative;
            z-index: 10;
        }

        .progress-container { background: #eee; border-radius: 10px; height: 14px; margin-bottom: 20px; overflow: hidden; border: 1px solid #ddd; }
        #bar-fill { background: linear-gradient(90deg, #2ed573, #7bed9f); height: 100%; width: 5%; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .operation { 
            font-size: 3.8rem; font-weight: 800; color: #2d3436; 
            margin: 1.5rem 0; min-height: 140px; display: flex; 
            align-items: center; justify-content: center; line-height: 1.2;
            background: #f1f2f6; border-radius: 20px; border: 2px dashed #a29bfe;
        }

        input { 
            width: 100%; padding: 15px; font-size: 35px; border: 4px solid #dfe6e9; 
            border-radius: 20px; outline: none; text-align: center; box-sizing: border-box;
            background: #fff; transition: 0.3s; color: var(--p); font-weight: bold;
        }
        input:focus { border-color: var(--accent); background: #fffaf0; }

        .btn { 
            width: 100%; padding: 20px; border: none; border-radius: 20px; 
            font-size: 1.4rem; font-weight: 900; cursor: pointer; margin-top: 1.5rem;
            color: white; transition: 0.2s; text-transform: uppercase;
            box-shadow: 0 6px 0 rgba(0,0,0,0.2);
        }
        .btn:active { transform: translateY(3px); box-shadow: 0 3px 0 rgba(0,0,0,0.2); }

        .feedback { 
            margin-top: 1.5rem; padding: 18px; border-radius: 15px; 
            display: none; font-weight: bold; font-size: 1.3rem;
            animation: bounceIn 0.5s;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .correct { background: #e3ffef; color: #009432; border: 2px solid #2ed573; }
        .incorrect { background: #ffebeb; color: #eb4d4b; border: 2px solid #ff7675; }
    </style>
</head>
<body>

<div class="card" id="quiz-container">
    <div class="progress-container"><div id="bar-fill"></div></div>
    <div style="font-weight: 900; color: var(--p); letter-spacing: 1px;">🌟 RETO DE ANDREA 🌟</div>
    <div style="font-size: 0.9rem; color: #636e72; margin-top: 5px;">Desafío <span id="q-count">1</span> de 20</div>
    
    <div class="operation" id="op-display">...</div>
    
    <input type="number" id="user-ans" placeholder="?" inputmode="numeric" autocomplete="off">
    
    <button id="main-btn" class="btn" style="background: var(--p);" onclick="handleAction()">¡Verificar! (Enter)</button>
    
    <div id="feedback" class="feedback"></div>
</div>

<script>
    const DRIVE_API_URL = "https://script.google.com/macros/s/AKfycbweOz0K55Fm2UCBkgwGzyFxasdoO3c_h3Tkt2Mn-uSO20H4vevgoki0NGCDQOCcBEcQxQ/exec"; 
    
    let currentQ = 1;
    const totalQs = 20;
    let num1, num2, answer, isWaitingNext = false;
    let preguntasHechas = new Set();

    const letras = ["CERO", "UNO", "DOS", "TRES", "CUATRO", "CINCO", "SEIS", "SIETE", "OCHO", "NUEVE", "DIEZ"];
    const mensajesExito = ["¡Eres brillante! ✨", "¡Increíble trabajo! 🚀", "¡Lo tienes dominado! 🔥", "¡Eres una genio! 🌈", "¡Sigue así, Andrea! 🏆"];

    function lanzarConfeti() {
        confetti({
            particleCount: 100,
            spread: 70,
            origin: { y: 0.6 },
            colors: ['#6c5ce7', '#00cec9', '#ffa502', '#ff7675']
        });
    }

    function generate() {
        let combo;
        do {
            num1 = Math.floor(Math.random() * 9) + 2; 
            num2 = Math.floor(Math.random() * 9) + 2;
            combo = `${Math.min(num1,num2)}x${Math.max(num1,num2)}`;
        } while (preguntasHechas.has(combo) && preguntasHechas.size < 80);
        
        preguntasHechas.add(combo);
        answer = num1 * num2;
        
        const display = document.getElementById('op-display');
        const usarLetras = Math.random() > 0.5;

        if(usarLetras) {
            display.style.fontSize = '2.2rem';
            display.innerHTML = `${letras[num1]}<br><span style="color:var(--accent); font-size:1.4rem">X</span><br>${letras[num2]}`;
        } else {
            display.style.fontSize = '4rem';
            display.innerHTML = `${num1} <span style="color:var(--p)">&times;</span> ${num2}`;
        }

        const input = document.getElementById('user-ans');
        input.value = "";
        input.disabled = false;
        input.focus();
        
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('main-btn').innerHTML = "¡Verificar! (Enter)";
        document.getElementById('main-btn').style.background = "var(--p)";
        isWaitingNext = false;

        document.getElementById('bar-fill').style.width = `${(currentQ/totalQs)*100}%`;
    }

    function handleAction() {
        if (!isWaitingNext) {
            check();
        } else {
            nextQuestion();
        }
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            handleAction();
        }
    });

    function check() {
        const input = document.getElementById('user-ans');
        const val = parseInt(input.value);
        if (isNaN(val)) return;

        const feedback = document.getElementById('feedback');
        feedback.style.display = 'block';
        
        if(val === answer) {
            lanzarConfeti();
            const msg = mensajesExito[Math.floor(Math.random() * mensajesExito.length)];
            feedback.className = "feedback correct";
            feedback.innerHTML = msg;
        } else {
            feedback.className = "feedback incorrect";
            feedback.innerHTML = `¡Casi! La respuesta es ${answer}.<br>¡La próxima la sacas! 💪`;
        }
        
        input.disabled = true;
        isWaitingNext = true;
        document.getElementById('main-btn').innerHTML = "Siguiente →";
        document.getElementById('main-btn').style.background = "var(--s)";
        
        enviarDatos(val, answer);
    }

    function nextQuestion() {
        if(currentQ < totalQs) {
            currentQ++;
            document.getElementById('q-count').innerText = currentQ;
            generate();
        } else {
            lanzarConfeti();
            setTimeout(lanzarConfeti, 500); // Doble confeti al final
            document.getElementById('quiz-container').innerHTML = 
                "<h1 style='color:var(--p); font-size: 2.5rem;'>¡MISIÓN CUMPLIDA! 🏆</h1>" +
                "<p style='font-size:1.2rem'>Andrea, hoy demostraste que eres imparable.</p>" +
                "<button class='btn' style='background:var(--s)' onclick='location.reload()'>¿Jugar de nuevo?</button>";
        }
    }

    function enviarDatos(u, c) {
        fetch(DRIVE_API_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({
                nombre: "Andrea",
                formula: `${num1}x${num2}`,
                respuestaAlumno: u,
                respuestaCorrecta: c,
                modo: "Tablas_Confeti"
            })
        });
    }

    window.onload = generate;
</script>
</body>
</html>
