<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script type="text/javascript" src="jsme/jsme.nocache.js"></script>
    <script>
        var jsmeApplet;
        function jsmeOnLoad() {
            // JSApplet es la forma minimalista que encontraste
            jsmeApplet = new JSApplet.JSME("jsme_container", "380px", "340px", {
                "options" : "stereo,hydrogens"
            });
            
            // Cada vez que el estudiante dibuje algo, enviamos el SMILES al padre (tu examen)
            jsmeApplet.setNotifyStructureChangeJSfunction("enviarAlPadre");
        }

        function enviarAlPadre() {
            var smiles = jsmeApplet.smiles();
            window.opener.postMessage({ "smiles": smiles }, "*");
        }
    </script>
</head>
<body style="margin:0; overflow:hidden;">
    <div id="jsme_container"></div>
    <p style="font-family:sans-serif; font-size:12px; text-align:center; color:gray;">
        El dibujo se guarda automáticamente en el examen.
    </p>
</body>
</html>
