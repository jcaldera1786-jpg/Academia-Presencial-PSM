<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script type="text/javascript" src="jsme/jsme.nocache.js"></script>
    <script>
        var jsmeApplet;

        function jsmeOnLoad() {
            // Inicializa el editor minimalista
            jsmeApplet = new JSApplet.JSME("jsme_container", "380px", "340px", {
                "options" : "stereo,hydrogens"
            });

            // ESTA ES LA MAGIA: Avisa a la función "enviarAlExamen" ante cualquier cambio
            jsmeApplet.setNotifyStructureChangeJSfunction("enviarAlExamen");
        }

        function enviarAlExamen() {
            var smiles = jsmeApplet.smiles();
            // Envía el SMILES a la ventana que lo abrió (tu examen)
            if (window.opener) {
                window.opener.postMessage({ "smiles": smiles }, "*");
            }
        }
    </script>
</head>
<body style="margin:0; background:#fff; overflow:hidden;">
    <div id="jsme_container"></div>
    <div style="font-family:sans-serif; font-size:11px; text-align:center; padding:5px; background:#f0f0f0;">
        El dibujo se actualiza automáticamente en el examen.
    </div>
</body>
</html>
