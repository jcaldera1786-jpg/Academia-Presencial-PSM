<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Examen de Isomería - PSM</title>
    <style>
        :root { --psm-blue: #003366; }
        body { font-family: sans-serif; background: #f4f7f6; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 15px; border-top: 8px solid var(--psm-blue); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-flotante { background: #b8860b; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin: 15px 0; }
        #cuadro_smiles { background: #e8f5e9; padding: 15px; border: 2px solid #2e7d32; border-radius: 8px; font-weight: bold; color: #1b5e20; min-height: 20px; margin: 10px 0; }
        .btn-enviar { background: #28a745; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>Evaluación de Estereoquímica</h2>
    <p><b>Prof. José Ángel Caldera</b></p>
    
    <input type="text" id="nombre" placeholder="Nombre y Apellido" style="width:90%; padding:10px; margin-bottom:10px;">

    <div style="text-align:left; background:#fff9c4; padding:10px; border-radius:8px; font-size:14px;">
        <strong>Reto:</strong> Dibuje el <b>(S)-2-butanol</b> en la ventana emergente.
    </div>

    <button class="btn-flotante" onclick="abrirVentana()">🎨 Abrir Editor Flotante</button>

    <p>Estructura capturada:</p>
    <div id="cuadro_smiles">Aún no hay dibujo...</div>

    <button class="btn-enviar" onclick="enviarFinal()">✅ Enviar a Drive</button>
</div>

<script>
    function abrirVentana() {
        // Abrimos tu nuevo archivo local
        window.open("editor.html", "EditorQuimico", "width=420,height=450,scrollbars=no,resizable=no");
    }

    // ESCUCHADOR DE DATOS: Aquí es donde ocurre la magia
    window.addEventListener("message", function(event) {
        // Si el mensaje trae un SMILES, lo ponemos en el cuadro
        if (event.data && event.data.smiles) {
            document.getElementById("cuadro_smiles").innerText = event.data.smiles;
        }
    }, false);

    function enviarFinal() {
        const smiles = document.getElementById("cuadro_smiles").innerText;
        const nombre = document.getElementById("nombre").value;
        if(smiles === "Aún no hay dibujo..." || !nombre) {
            alert("Por favor, complete el dibujo y su nombre.");
            return;
        }
        // Tu lógica de fetch a Google Sheets aquí...
        alert("Enviando " + smiles + " a la base de datos.");
    }
</script>

</body>
</html>
