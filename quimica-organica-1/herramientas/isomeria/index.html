<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Evaluación de Estereoquímica - PSM</title>
    <style>
        :root { --psm-blue: #003366; --psm-gold: #b8860b; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 10px; text-align: center; }
        .container { max-width: 550px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 10px solid var(--psm-blue); }
        .input-group { margin-bottom: 15px; text-align: left; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        #cuadro_smiles { background: #e8f5e9; padding: 15px; border: 2px solid #2e7d32; border-radius: 8px; font-weight: bold; min-height: 25px; margin: 15px 0; word-break: break-all; }
        .btn-send { background: #28a745; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>Examen de Isomería</h2>
    <p><b>Prof. José Ángel Caldera</b></p>

    <div class="input-group">
        <input type="text" id="nombre" placeholder="Nombre y Apellido">
    </div>
    <div class="input-group">
        <input type="text" id="cedula" placeholder="Cédula de Identidad">
    </div>

    <button onclick="window.open('editor.html','EditorQuimico','width=420,height=480')" style="background:var(--psm-gold); color:white; border:none; padding:10px; border-radius:5px; cursor:pointer; width:100%;">
        🎨 Abrir Editor para dibujar (S)-2-butanol
    </button>

    <p>Estructura capturada:</p>
    <div id="cuadro_smiles">Aún no hay dibujo...</div>
    <input type="hidden" id="smiles_input">

    <button class="btn-send" onclick="enviarFinal()">✅ Guardar y Enviar Evaluación</button>
</div>

<script>
    // Escucha el SMILES desde la ventana flotante
    window.addEventListener("message", function(event) {
        if (event.data && event.data.smiles) {
            document.getElementById("cuadro_smiles").innerText = event.data.smiles;
            document.getElementById("smiles_input").value = event.data.smiles;
        }
    }, false);

    function enviarFinal() {
        const nombre = document.getElementById("nombre").value;
        const cedula = document.getElementById("cedula").value;
        const smiles = document.getElementById("smiles_input").value;

        if(!nombre || !cedula || !smiles) {
            alert("Por favor complete todos los campos.");
            return;
        }

        const scriptURL = 'https://script.google.com/macros/s/AKfycbwzgA6GuPJxEP1PTCByJKa4tiEn5-mbUyVKM4Gx49Hobg8ExGi_Xnq4IdiPmD6daRikyQ/exec'; // <--- PEGA TU URL AQUÍ

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({
                type: "EVALUACION_SMILES",
                id: cedula,
                name: nombre,
                preguntaCorrecta: "(S)-2-butanol",
                smiles: smiles
            })
        }).then(() => {
            alert("Enviado. Los datos aparecerán en el Drive del Profesor.");
            location.reload();
        });
    }
</script>
</body>
</html>
