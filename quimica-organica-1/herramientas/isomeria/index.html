<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación de Isomería - PSM</title>
    
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/kekule/dist/themes/default/kekule.css" />
    <script src="https://unpkg.com/kekule/dist/kekule.js?modules=chemWidget,algorithm"></script>

    <style>
        :root { --psm-blue: #003366; --psm-gold: #b8860b; }
        body { font-family: sans-serif; background: #f0f2f5; padding: 10px; text-align: center; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; border-top: 8px solid var(--psm-blue); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
        #composer { width: 100%; height: 400px; border: 1px solid #ccc; border-radius: 8px; background: #fff; }
        .btn { background: #28a745; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; font-size: 1.1rem; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>Examen de Isomería y Estereoquímica</h2>
    <p><b>Prof. José Ángel Caldera</b></p>

    <div class="input-group">
        <input type="text" id="nombre" placeholder="Nombre y Apellido">
        <input type="text" id="cedula" placeholder="Cédula">
    </div>

    <div style="background: #fff9c4; padding: 15px; border-radius: 8px; text-align: left; border-left: 5px solid var(--psm-gold); margin-bottom: 15px;">
        <strong>Reto:</strong> Dibuje el <b>(S)-2-butanol</b>. Use las herramientas de enlaces para indicar la estereoquímica correcta.
    </div>

    <div id="composer" data-widget="Kekule.ChemWidget.Composer" data-chem-obj=""></div>

    <button class="btn" onclick="enviar()">✅ Enviar Evaluación</button>
</div>

<script>
    function enviar() {
        var composer = Kekule.Widget.getWidgetById('composer');
        var mol = composer.exportObjs(Kekule.Molecule)[0];
        var smiles = Kekule.IO.saveFormatData(mol, 'smi');
        var nombre = document.getElementById('nombre').value;
        var cedula = document.getElementById('cedula').value;

        if (!nombre || !cedula || !smiles) {
            alert("Por favor complete sus datos y el dibujo.");
            return;
        }

        // Su URL de Google Apps Script
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwPsysDh255aIdyonjBX1SvGqQG9lNJzXH__Is_aJ_wWeikxdFpIkG0ryFg2QCQJF3E4g/exec';

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({
                nombre: nombre,
                cedula: cedula,
                pregunta: "(S)-2-butanol",
                smiles: smiles
            })
        }).then(() => {
            alert("✅ Evaluación enviada con éxito.");
        }).catch(() => alert("Error al enviar."));
    }
</script>

</body>
</html>
