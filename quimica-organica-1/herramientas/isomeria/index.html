<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación de Estereoquímica - PSM</title>
    
    <script type="text/javascript" src="https://jsme-editor.github.io/dist/jsme/jsme.nocache.js"></script>

    <style>
        :root { --psm-blue: #003366; --psm-gold: #b8860b; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 15px; text-align: center; }
        .container { max-width: 650px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 10px solid var(--psm-blue); }
        input { width: 90%; padding: 12px; margin: 5px 0; border: 1px solid #ccc; border-radius: 6px; }
        /* El contenedor debe tener estas dimensiones para que el minimalista no se rompa */
        #jsme_container { width: 100%; height: 400px; margin: 20px auto; }
        .btn-send { background: #28a745; color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>Examen de Isomería y Estereoquímica</h2>
    <p><b>Prof. José Ángel Caldera</b></p>

    <input type="text" id="student_name" placeholder="Nombre y Apellido">
    <input type="text" id="student_id" placeholder="Cédula">

    <div style="background: #fff9c4; padding: 10px; border-radius: 6px; text-align: left; border-left: 5px solid var(--psm-gold); margin: 15px 0;">
        <strong>Reto:</strong> Dibuje el <b>(S)-2-butanol</b> indicando la cuña correcta.
    </div>

    <div id="jsme_container"></div>

    <button class="btn-send" onclick="enviarExamen()">✅ Enviar Evaluación</button>
</div>

<script>
    var jsmeApplet;

    // PATRÓN MINIMALISTA: JSME busca esta función al terminar de cargar los archivos .cache.js
    function jsmeOnLoad() {
        console.log("JSME Engine iniciado...");
        // Esta línea es la que crea el objeto en el DOM
        jsmeApplet = new JSME.Jsme("jsme_container", "100%", "400px", {
            "options" : "stereo,hydrogens"
        });
    }

    function enviarExamen() {
        if (!jsmeApplet) {
            alert("El editor no ha cargado aún.");
            return;
        }
        var smiles = jsmeApplet.smiles();
        var nombre = document.getElementById('student_name').value;
        
        if (!nombre || !smiles) {
            alert("Complete los datos y el dibujo.");
            return;
        }

        // URL de tu Script de Google para Química Orgánica
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwPsysDh255aIdyonjBX1SvGqQG9lNJzXH__Is_aJ_wWeikxdFpIkG0ryFg2QCQJF3E4g/exec';
        
        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({
                name: nombre,
                cedula: document.getElementById('student_id').value,
                smiles: smiles
            })
        }).then(() => alert("Respuesta registrada."));
    }
</script>

</body>
</html>
