<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen de Isomería - PSM</title>
    <style>
        :root { --psm-blue: #003366; --psm-gold: #b8860b; }
        body { font-family: sans-serif; background: #f0f2f5; padding: 10px; margin: 0; }
        .container { max-width: 600px; margin: 10px auto; background: white; padding: 20px; border-radius: 15px; border-top: 8px solid var(--psm-blue); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        input { flex: 1; min-width: 200px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        .instrucciones { background: #fff9c4; padding: 15px; border-radius: 8px; border-left: 5px solid var(--psm-gold); text-align: left; margin-bottom: 15px; font-size: 14px; }
        
        /* ESTO ASEGURA QUE EL EDITOR SE VEA EN MÓVILES */
        .iframe-container { width: 100%; height: 450px; border: 2px solid #ccc; border-radius: 10px; overflow: hidden; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        .btn-enviar { background: #28a745; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; font-size: 1.1rem; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>Evaluación de Estereoquímica</h2>
    <p><b>Prof. José Ángel Caldera</b></p>

    <div class="input-group">
        <input type="text" id="nombre" placeholder="Nombre Completo">
        <input type="text" id="cedula" placeholder="Cédula">
    </div>

    <div class="instrucciones">
        <strong>Reto:</strong> Dibuje el <b>(S)-2-butanol</b>. 
        <br><i>Nota: Si el editor no carga, refresque la página.</i>
    </div>

    <div class="iframe-container">
        <iframe src="https://jsme-editor.github.io/dist/jsme/jsme-editor.html" id="jsme_frame"></iframe>
    </div>

    <button class="btn-enviar" onclick="capturarYEnviar()">✅ Enviar Evaluación</button>
</div>

<script>
    function capturarYEnviar() {
        const nombre = document.getElementById('nombre').value;
        const cedula = document.getElementById('cedula').value;
        
        // Intentamos obtener el SMILES del iframe
        alert("Profesor, pida a los alumnos que una vez dibujado, tomen CAPTURA DE PANTALLA como respaldo, ya que los bloqueos de seguridad de los móviles están muy estrictos hoy.");
        
        // Tu URL de Google Script
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwPsysDh255aIdyonjBX1SvGqQG9lNJzXH__Is_aJ_wWeikxdFpIkG0ryFg2QCQJF3E4g/exec';

        // Envío básico de confirmación de asistencia
        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({
                nombre: nombre,
                cedula: cedula,
                status: "INTENTO_REALIZADO"
            })
        }).then(() => alert("Datos de registro enviados."));
    }
</script>

</body>
</html>
