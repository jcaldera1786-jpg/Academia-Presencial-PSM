<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrenador de Estequiometría Avanzada - Prof. José Ángel Caldera</title>
    <style>
        :root { --primary: #004d40; --secondary: #bf360c; --bg: #f0f4f4; --text-dark: #2c3e50; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; color: var(--text-dark); }
        .card { max-width: 900px; width: 100%; background: white; padding: 35px; border-radius: 20px; box-shadow: 0 12px 40px rgba(0,0,0,0.15); border-top: 12px solid var(--primary); }
        .equation-display { background: #1a1a1a; color: white; padding: 30px; border-radius: 15px; font-size: 1.8rem; text-align: center; margin: 25px 0; border: 3px solid #333; font-family: 'Times New Roman', Times, serif; letter-spacing: 1px; }
        
        /* Estilos específicos para distinguir coeficientes de fórmulas */
        .coef-input { width: 55px; padding: 10px; text-align: center; border: 3px solid var(--secondary); border-radius: 8px; font-weight: bold; font-size: 1.3rem; margin: 0 8px; background-color: #fff3e0; color: #b71c1c; }
        .formula { font-weight: normal; color: #fff; }
        .formula sub { font-size: 0.8em; vertical-align: sub; color: #81d4fa; } /* Subíndices en color azul claro para resaltar */

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin: 25px 0; }
        .input-box { background: #f9f9f9; padding: 20px; border-radius: 12px; border: 1px solid #e0e0e0; }
        label { display: block; font-weight: bold; margin-bottom: 10px; color: var(--primary); font-size: 1rem; }
        input[type="number"], select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        
        button { width: 100%; padding: 20px; border: none; border-radius: 10px; font-size: 1.3rem; cursor: pointer; transition: 0.2s; margin-top: 20px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .btn-check { background: var(--primary); color: white; }
        .btn-check:hover { background: #00695c; transform: translateY(-2px); }
        .btn-next { background: #455a64; color: white; display: none; }
        
        .feedback { margin-top: 30px; padding: 25px; border-radius: 12px; display: none; border: 3px solid #ccc; animation: fadeIn 0.5s; text-align: center;}
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
        .correct { border-color: #2e7d32; background: #e8f5e9; color: #1b5e20; }
        .incorrect { border-color: #c62828; background: #ffebee; color: #b71c1c; }
        .step-by-step { font-size: 1rem; color: #333; background: rgba(255,255,255,0.7); padding: 20px; margin-top: 20px; border-radius: 8px; text-align: left; line-height: 1.6; border: 1px solid #ddd;}
        .step-by-step b { color: var(--secondary); }
    </style>
</head>
<body>

<div class="card">
    <div style="text-align:center">
        <h1 style="margin:0; color:var(--primary); font-size: 2.2rem;">⚗️ Simulador Estequiométrico</h1>
        <p style="font-size: 1.1rem; color: #666;">Práctica de Balanceo, Reactivo Limitante y Cálculo de Masa</p>
    </div>

    <div id="setup-info" style="padding: 20px; background: #e0f2f1; border-radius: 12px; text-align:center; margin: 20px 0; font-weight: bold; font-size: 1.1rem; border: 1px solid #b2dfdb;"></div>

    <div id="game-container">
        <div class="equation-display" id="equation-html"></div>
        
        <div class="grid">
            <div class="input-box">
                <label>Reactivo Limitante (R.L.):</label>
                <select id="ans-lim"></select>
            </div>
            <div class="input-box">
                <label>Masa Sobrante del Exceso (g):</label>
                <input type="number" step="0.01" id="ans-exc" placeholder="0.00">
            </div>
            <div class="input-box">
                <label id="label-p1"></label>
                <input type="number" step="0.01" id="ans-p1" placeholder="0.00">
            </div>
            <div id="box-p2" class="input-box" style="display:none">
                <label id="label-p2"></label>
                <input type="number" step="0.01" id="ans-p2" placeholder="0.00">
            </div>
        </div>

        <button class="btn-check" id="btn-val" onclick="validate()">Validar Resultados</button>
        <button class="btn-next" id="btn-next" onclick="generateChallenge()">Siguiente Desafío Aleatorio ➔</button>
    </div>

    <div id="feedback" class="feedback"></div>
</div>

<script>
// Función para formatear fórmulas químicas con subíndices HTML
function formatFormula(formula) {
    // Reemplaza cualquier número que siga a una letra con ese número dentro de etiquetas <sub>
    return formula.replace(/([a-zA-Z])(\d+)/g, '$1<sub>$2</sub>');
}

const database = [
    { name: "Combustión de Metano", reacs: ["CH4", "O2"], prods: ["CO2", "H2O"], bal: [1, 2, 1, 2], mm: [16.04, 32.0, 44.01, 18.01] },
    { name: "Formación de Amoníaco (Haber)", reacs: ["N2", "H2"], prods: ["NH3"], bal: [1, 3, 2], mm: [28.01, 2.01, 17.03] },
    { name: "Reacción de Desplazamiento", reacs: ["Zn", "HCl"], prods: ["ZnCl2", "H2"], bal: [1, 2, 1, 1], mm: [65.38, 36.46, 136.3, 2.01] },
    { name: "Combustión de Propano", reacs: ["C3H8", "O2"], prods: ["CO2", "H2O"], bal: [1, 5, 3, 4], mm: [44.1, 32.0, 44.01, 18.01] },
    { name: "Síntesis de Óxido de Aluminio", reacs: ["Al", "O2"], prods: ["Al2O3"], bal: [4, 3, 2], mm: [26.98, 32.0, 101.96] },
    { name: "Neutralización Ácido-Base", reacs: ["H2SO4", "NaOH"], prods: ["Na2SO4", "H2O"], bal: [1, 2, 1, 2], mm: [98.08, 40.00, 142.04, 18.01] }
];

let currentQ = {};

function generateChallenge() {
    document.getElementById('feedback').style.display = "none";
    document.getElementById('btn-next').style.display = "none";
    document.getElementById('btn-val').style.display = "block";
    document.querySelectorAll('input').forEach(i => i.value = "");
    
    const template = database[Math.floor(Math.random() * database.length)];
    const m1 = (Math.random() * 80 + 10).toFixed(2);
    const m2 = (Math.random() * 120 + 15).toFixed(2);
    currentQ = { ...template, m1: parseFloat(m1), m2: parseFloat(m2) };

    // Renderizado elegante de la ecuación
    let html = "";
    currentQ.reacs.forEach((r, i) => {
        html += `<input type="number" class="coef-input" id="c${i}" title="Coeficiente para ${r}"> <span class="formula">${formatFormula(r)}</span> ${i < currentQ.reacs.length-1 ? '+' : '→'} `;
    });
    currentQ.prods.forEach((p, i) => {
        let idx = i + currentQ.reacs.length;
        html += `<input type="number" class="coef-input" id="c${idx}" title="Coeficiente para ${p}"> <span class="formula">${formatFormula(p)}</span> ${i < currentQ.prods.length-1 ? '+' : ''}`;
    });
    document.getElementById('equation-html').innerHTML = html;

    // Formateo elegante en el texto de información
    document.getElementById('setup-info').innerHTML = `REACCIONAR: ${m1}g de ${formatFormula(currentQ.reacs[0])} con ${m2}g de ${formatFormula(currentQ.reacs[1])}`;
    document.getElementById('label-p1').innerHTML = `Masa de ${formatFormula(currentQ.prods[0])} producida (g):`;
    
    if(currentQ.prods[1]) {
        document.getElementById('box-p2').style.display = "block";
        document.getElementById('label-p2').innerHTML = `Masa de ${formatFormula(currentQ.prods[1])} producida (g):`;
    } else {
        document.getElementById('box-p2').style.display = "none";
    }

    let sel = document.getElementById('ans-lim');
    sel.innerHTML = '<option value="">--Seleccionar--</option>';
    // Aquí no formateamos con subíndices para el select, es más seguro para la comparación de texto
    currentQ.reacs.forEach(r => sel.innerHTML += `<option value="${r}">${r}</option>`);
}

function validate() {
    const n1 = currentQ.m1 / currentQ.mm[0];
    const n2 = currentQ.m2 / currentQ.mm[1];
    const r1_ratio = n1 / currentQ.bal[0];
    const r2_ratio = n2 / currentQ.bal[1];
    
    let limitIdx = r1_ratio < r2_ratio ? 0 : 1;
    let excessIdx = limitIdx === 0 ? 1 : 0;
    
    const nLimitante = limitIdx === 0 ? n1 : n2;
    const nExcesoConsumido = nLimitante * (currentQ.bal[excessIdx] / currentQ.bal[limitIdx]);
    const nMolesSobrantes = (limitIdx === 0 ? n2 : n1) - nExcesoConsumido;
    const mSobrante = nMolesSobrantes * currentQ.mm[excessIdx];
    
    const mProds = currentQ.prods.map((_, i) => {
        let pCoef = currentQ.bal[i + currentQ.reacs.length];
        return (nLimitante * (pCoef / currentQ.bal[limitIdx])) * currentQ.mm[i + currentQ.reacs.length];
    });

    const uBal = [...document.querySelectorAll('.coef-input')].map(i => parseInt(i.value) || 0);
    const uLim = document.getElementById('ans-lim').value;
    const uExc = parseFloat(document.getElementById('ans-exc').value) || 0;
    const uP1 = parseFloat(document.getElementById('ans-p1').value) || 0;

    const balOk = uBal.every((v, i) => v === currentQ.bal[i]);
    const limOk = uLim === currentQ.reacs[limitIdx];
    const excOk = Math.abs(uExc - mSobrante) < 0.8; // Margen ligeramente mayor para evitar falsos negativos
    const p1Ok = Math.abs(uP1 - mProds[0]) < 0.8;

    const fb = document.getElementById('feedback');
    fb.style.display = "block";
    
    if(balOk && limOk && excOk && p1Ok) {
        fb.className = "feedback correct";
        fb.innerHTML = `<strong>✔ ¡MAGNÍFICO!</strong><br>Tu análisis de laboratorio es exacto y riguroso.`;
    } else {
        fb.className = "feedback incorrect";
        fb.innerHTML = `<strong>❌ RESULTADOS NO COINCIDENTES</strong><br>Revisa los cálculos detallados a continuación.
        <div class="step-by-step">
            <b>Guía de Resolución Correcta:</b><br>
            • Balanceo Estequiométrico: <b>${currentQ.bal.join(' , ')}</b><br>
            • Moles iniciales: ${formatFormula(currentQ.reacs[0])} = ${n1.toFixed(3)} mol ; ${formatFormula(currentQ.reacs[1])} = ${n2.toFixed(3)} mol<br>
            • Reactivo Limitante (se agota): <b>${formatFormula(currentQ.reacs[limitIdx])}</b><br>
            • Masa de Exceso Sobrante: <b>${mSobrante.toFixed(2)} g</b> de ${formatFormula(currentQ.reacs[excessIdx])}<br>
            • Masa teórica de ${formatFormula(currentQ.prods[0])}: <b>${mProds[0].toFixed(2)} g</b>
        </div>`;
    }
    document.getElementById('btn-next').style.display = "block";
    document.getElementById('btn-val').style.display = "none";
}

generateChallenge();
</script>
</body>
</html>
