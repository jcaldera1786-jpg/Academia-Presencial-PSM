<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reto Balanceo Blindado - Zuforca Academy</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root { --primary: #7b241c; --secondary: #1b4f72; --success: #145a32; --bg: #f4f6f7; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .header { text-align: center; border-bottom: 5px solid var(--primary); margin-bottom: 25px; }
        .stats-bar { display: flex; justify-content: space-around; background: var(--secondary); color: white; padding: 10px; border-radius: 8px; margin-bottom: 20px; }
        .card { border: 2px solid #ddd; padding: 25px; border-radius: 12px; min-height: 380px; text-align: center; }
        .equation-box { font-size: 1.8em; margin: 30px 0; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 10px; color: #1a5276; }
        .coef-input { width: 45px; height: 45px; text-align: center; font-size: 0.8em; border: 2px solid var(--secondary); border-radius: 5px; font-weight: bold; color: #c0392b; }
        .feedback { display: none; padding: 15px; border-radius: 8px; margin-top: 15px; font-weight: bold; text-align: left; }
        .btn-action { background: var(--success); color: white; padding: 12px 30px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        .btn-action:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Desafío: Balanceo Estequiométrico Pro</h1>
        <p>Zuforca Academy | Prof. José Ángel Caldera Luzardo</p>
    </div>

    <div id="setup">
        <input type="text" id="name" placeholder="Nombre Completo" style="width:95%; padding:12px; margin-bottom:10px; border-radius:5px; border:1px solid #ccc;">
        <input type="text" id="cedula" placeholder="Cédula (Solo números)" oninput="this.value = this.value.replace(/[^0-9]/g, '');" style="width:95%; padding:12px; margin-bottom:20px; border-radius:5px; border:1px solid #ccc;">
        <button class="option" onclick="iniciar()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:8px; cursor:pointer; font-size:1.1em;">Iniciar Evaluación Blindada</button>
    </div>

    <div id="quiz" style="display:none;">
        <div class="stats-bar">
            <span>Pregunta: <span id="q-num">1</span>/10</span>
            <span>Acierto: <span id="percent">0</span>%</span>
            <span>Intento: <span id="attempt-num">1</span></span>
        </div>
        <div class="card">
            <h3>Escriba los coeficientes para balancear la ecuación:</h3>
            <p style="color: #666; font-size: 0.9em;">(Si el coeficiente es 1, puede dejarlo en blanco o colocar 1)</p>
            <div id="equation-area" class="equation-box"></div>
            
            <div id="feedback" class="feedback"></div>
            
            <div id="action-area">
                <button id="btn-check" class="btn-action" onclick="verificar()">Verificar Balanceo</button>
                <button id="btn-next" class="btn-action" onclick="siguiente()" style="display:none; background: var(--secondary);">Siguiente →</button>
            </div>
        </div>
    </div>
</div>

<script>
    const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbxyvZ7kq5nwmQzZMyH7l4Fyl3_NpTgARxpbJBO_UQb2g2ihV1mf3TNMJ3dUFv1xh2oqEQ/exec";
    
    let userData = { nombre: "", cedula: "", intento: 1 };
    let correctCount = 0, qIndex = 0, currentAnswer = [];
    let bancoActual = [];

const poolReacciones = [
        // NIVEL BÁSICO (Síntesis y Descomposición)
        { ec: ["H₂", "+", "O₂", "→", "H₂O"], coefs: [2, 1, 2] },
        { ec: ["N₂", "+", "H₂", "→", "NH₃"], coefs: [1, 3, 2] },
        { ec: ["Li", "+", "O₂", "→", "Li₂O"], coefs: [4, 1, 2] },
        { ec: ["Mg", "+", "O₂", "→", "MgO"], coefs: [2, 1, 2] },
        { ec: ["Na", "+", "Cl₂", "→", "NaCl"], coefs: [2, 1, 2] },
        { ec: ["KClO₃", "→", "KCl", "+", "O₂"], coefs: [2, 2, 3] },
        { ec: ["CaCO₃", "→", "CaO", "+", "CO₂"], coefs: [1, 1, 1] },
        { ec: ["H₂O₂", "→", "H₂O", "+", "O₂"], coefs: [2, 2, 1] },
        { ec: ["Al", "+", "O₂", "→", "Al₂O₃"], coefs: [4, 3, 2] },
        { ec: ["Fe", "+", "O₂", "→", "Fe₂O₃"], coefs: [4, 3, 2] },

        // NIVEL INTERMEDIO (Sustitución y Óxidos)
        { ec: ["Zn", "+", "HCl", "→", "ZnCl₂", "+", "H₂"], coefs: [1, 2, 1, 1] },
        { ec: ["Mg", "+", "HCl", "→", "MgCl₂", "+", "H₂"], coefs: [1, 2, 1, 1] },
        { ec: ["Cu", "+", "AgNO₃", "→", "Cu(NO₃)₂", "+", "Ag"], coefs: [1, 2, 1, 2] },
        { ec: ["Al", "+", "H₂SO₄", "→", "Al₂(SO₄)₃", "+", "H₂"], coefs: [2, 3, 1, 3] },
        { ec: ["Na", "+", "H₂O", "→", "NaOH", "+", "H₂"], coefs: [2, 2, 2, 1] },
        { ec: ["Fe", "+", "H₂O", "→", "Fe₃O₄", "+", "H₂"], coefs: [3, 4, 1, 4] },
        { ec: ["P₄", "+", "O₂", "→", "P₄O₁₀"], coefs: [1, 5, 1] },
        { ec: ["S₈", "+", "O₂", "→", "SO₃"], coefs: [1, 12, 8] },
        { ec: ["Cl₂", "+", "KI", "→", "KCl", "+", "I₂"], coefs: [1, 2, 2, 1] },
        { ec: ["Pb(NO₃)₂", "+", "KI", "→", "PbI₂", "+", "KNO₃"], coefs: [1, 2, 1, 2] },

        // NIVEL AVANZADO (Combustión y otros)
        { ec: ["CH₄", "+", "O₂", "→", "CO₂", "+", "H₂O"], coefs: [1, 2, 1, 2] },
        { ec: ["C₂H₆", "+", "O₂", "→", "CO₂", "+", "H₂O"], coefs: [2, 7, 4, 6] },
        { ec: ["C₃H₈", "+", "O₂", "→", "CO₂", "+", "H₂O"], coefs: [1, 5, 3, 4] },
        { ec: ["C₄H₁₀", "+", "O₂", "→", "CO₂", "+", "H₂O"], coefs: [2, 13, 8, 10] },
        { ec: ["C₂H₂", "+", "O₂", "→", "CO₂", "+", "H₂O"], coefs: [2, 5, 4, 2] },
        { ec: ["C₂H₅OH", "+", "O₂", "→", "CO₂", "+", "H₂O"], coefs: [1, 3, 2, 3] },
        { ec: ["NH₃", "+", "O₂", "→", "NO", "+", "H₂O"], coefs: [4, 5, 4, 6] },
        { ec: ["FeS₂", "+", "O₂", "→", "Fe₂O₃", "+", "SO₂"], coefs: [4, 11, 2, 8] },
        { ec: ["K", "+", "H₂O", "→", "KOH", "+", "H₂"], coefs: [2, 2, 2, 1] },
        { ec: ["C₆H₁₂O₆", "+", "O₂", "→", "CO₂", "+", "H₂O"], coefs: [1, 6, 6, 6] }
// ADICIONALES (31 - 60) - NIVEL EXPERTO Y SALES
        { ec: ["Ag", "+", "H₂S", "+", "O₂", "→", "Ag₂S", "+", "H₂O"], coefs: [4, 2, 1, 2, 2] },
        { ec: ["Al", "+", "HCl", "→", "AlCl₃", "+", "H₂"], coefs: [2, 6, 2, 3] },
        { ec: ["BaCl₂", "+", "Na₂SO₄", "→", "BaSO₄", "+", "NaCl"], coefs: [1, 1, 1, 2] },
        { ec: ["Ca(OH)₂", "+", "CO₂", "→", "CaCO₃", "+", "H₂O"], coefs: [1, 1, 1, 1] },
        { ec: ["Cu", "+", "HNO₃", "→", "Cu(NO₃)₂", "+", "NO₂", "+", "H₂O"], coefs: [1, 4, 1, 2, 2] },
        { ec: ["H₂SO₄", "+", "NaOH", "→", "Na₂SO₄", "+", "H₂O"], coefs: [1, 2, 1, 2] },
        { ec: ["KI", "+", "Pb(NO₃)₂", "→", "PbI₂", "+", "KNO₃"], coefs: [2, 1, 1, 2] },
        { ec: ["MnO₂", "+", "HCl", "→", "MnCl₂", "+", "Cl₂", "+", "H₂O"], coefs: [1, 4, 1, 1, 2] },
        { ec: ["P₄", "+", "Cl₂", "→", "PCl₃"], coefs: [1, 6, 4] },
        { ec: ["C₅H₁₂", "+", "O₂", "→", "CO₂", "+", "H₂O"], coefs: [1, 8, 5, 6] },
        { ec: ["C₆H₆", "+", "O₂", "→", "CO₂", "+", "H₂O"], coefs: [2, 15, 12, 6] },
        { ec: ["K", "+", "Br₂", "→", "KBr"], coefs: [2, 1, 2] },
        { ec: ["Fe₂O₃", "+", "C", "→", "Fe", "+", "CO"], coefs: [1, 3, 2, 3] },
        { ec: ["TiCl₄", "+", "Mg", "→", "Ti", "+", "MgCl₂"], coefs: [1, 2, 1, 2] },
        { ec: ["Na₂O", "+", "H₂O", "→", "NaOH"], coefs: [1, 1, 2] },
        { ec: ["SO₂", "+", "O₂", "→", "SO₃"], coefs: [2, 1, 2] },
        { ec: ["C₁₂H₂₂O₁₁", "+", "O₂", "→", "CO₂", "+", "H₂O"], coefs: [1, 12, 12, 11] },
        { ec: ["H₃PO₄", "+", "Ca(OH)₂", "→", "Ca₃(PO₄)₂", "+", "H₂O"], coefs: [2, 3, 1, 6] },
        { ec: ["FeCl₃", "+", "NaOH", "→", "Fe(OH)₃", "+", "NaCl"], coefs: [1, 3, 1, 3] },
        { ec: ["CS₂", "+", "O₂", "→", "CO₂", "+", "SO₂"], coefs: [1, 3, 1, 2] },
        { ec: ["ZnS", "+", "O₂", "→", "ZnO", "+", "SO₂"], coefs: [2, 3, 2, 2] },
        { ec: ["Na₂CO₃", "+", "HCl", "→", "NaCl", "+", "H₂O", "+", "CO₂"], coefs: [1, 2, 2, 1, 1] },
        { ec: ["NH₃", "+", "CuO", "→", "Cu", "+", "N₂", "+", "H₂O"], coefs: [2, 3, 3, 1, 3] },
        { ec: ["C₈H₁₈", "+", "O₂", "→", "CO₂", "+", "H₂O"], coefs: [2, 25, 16, 18] },
        { ec: ["KMnO₄", "→", "K₂MnO₄", "+", "MnO₂", "+", "O₂"], coefs: [2, 1, 1, 1] },
        { ec: ["B₂H₆", "+", "O₂", "→", "B₂O₃", "+", "H₂O"], coefs: [1, 3, 1, 3] },
        { ec: ["Al₄C₃", "+", "H₂O", "→", "Al(OH)₃", "+", "CH₄"], coefs: [1, 12, 4, 3] },
        { ec: ["Ca₃(PO₄)₂", "+", "SiO₂", "+", "C", "→", "CaSiO₃", "+", "P₄", "+", "CO"], coefs: [2, 6, 10, 6, 1, 10] },
        { ec: ["Fe₂O₃", "+", "H₂", "→", "Fe", "+", "H₂O"], coefs: [1, 3, 2, 3] },
        { ec: ["C₂H₄", "+", "O₂", "→", "CO₂", "+", "H₂O"], coefs: [1, 3, 2, 2] }
    ];
    function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

    function iniciar() {
        const n = document.getElementById('name').value;
        const c = document.getElementById('cedula').value;
        if(!n || !c) return alert("Ingrese sus datos.");
        userData.nombre = n; userData.cedula = c;
        bancoActual = shuffle([...poolReacciones]).slice(0, 10);
        document.getElementById('setup').style.display = 'none';
        document.getElementById('quiz').style.display = 'block';
        cargar();
    }

    function cargar() {
        const r = bancoActual[qIndex];
        currentAnswer = r.coefs;
        const area = document.getElementById('equation-area');
        area.innerHTML = "";
        
        let inputCount = 0;
        r.ec.forEach((part) => {
            if (["+", "→"].includes(part)) {
                area.innerHTML += `<span>${part}</span>`;
            } else {
                area.innerHTML += `<input type="text" class="coef-input" id="c${inputCount}" placeholder="1">`;
                area.innerHTML += `<span>${part}</span>`;
                inputCount++;
            }
        });

        document.getElementById('feedback').style.display = 'none';
        document.getElementById('btn-check').style.display = 'inline-block';
        document.getElementById('btn-next').style.display = 'none';
        document.getElementById('q-num').innerText = qIndex + 1;
    }

    function verificar() {
        let studentAnswers = [];
        for(let i=0; i < currentAnswer.length; i++) {
            let val = document.getElementById(`c${i}`).value.trim();
            studentAnswers.push(val === "" ? 1 : parseInt(val));
        }

        const isCorrect = JSON.stringify(studentAnswers) === JSON.stringify(currentAnswer);
        const fb = document.getElementById('feedback');
        fb.style.display = 'block';
        
        if(isCorrect) {
            fb.innerHTML = "✅ ¡Perfecto! La ecuación está balanceada.";
            fb.style.background = "#d4edda";
            correctCount++;
        } else {
            fb.innerHTML = `❌ Incorrecto. Los coeficientes eran: [${currentAnswer.join(', ')}].`;
            fb.style.background = "#f8d7da";
        }

        document.getElementById('percent').innerText = ((correctCount/(qIndex+1))*100).toFixed(0);
        document.getElementById('btn-check').style.display = 'none';
        document.getElementById('btn-next').style.display = 'inline-block';
        document.querySelectorAll('.coef-input').forEach(input => input.disabled = true);
    }

    function siguiente() {
        if(qIndex < 9) {
            qIndex++;
            cargar();
        } else {
            prepararEnvio();
        }
    }

    function prepararEnvio() {
        const finalP = ((correctCount/10)*100).toFixed(0);
        document.getElementById('action-area').innerHTML = `<button id="btn-send" class="btn-action" onclick="enviar(${finalP})">Enviar Resultados</button>`;
    }

    async function enviar(p) {
        const btn = document.getElementById('btn-send');
        btn.disabled = true; btn.innerText = "Enviando...";
        const data = { nombre: userData.nombre, cedula: userData.cedula, puntos: p, intento: userData.intento };

        try {
            await fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            alert("SISTEMA: Datos guardados en la nube.");
            document.getElementById('action-area').innerHTML = `<button class="btn-action" onclick="reintentar()" style="background:var(--secondary)">Nuevo Intento</button>`;
        } catch (e) {
            alert("Error de conexión.");
            btn.disabled = false; btn.innerText = "Reintentar";
        }
    }

    function reintentar() {
        userData.intento++;
        correctCount = 0; qIndex = 0;
        bancoActual = shuffle([...poolReacciones]).slice(0, 10);
        document.getElementById('percent').innerText = "0";
        document.getElementById('attempt-num').innerText = userData.intento;
        document.getElementById('action-area').innerHTML = `<button id="btn-check" class="btn-action" onclick="verificar()">Verificar Balanceo</button><button id="btn-next" class="btn-action" onclick="siguiente()" style="display:none;">Siguiente →</button>`;
        cargar();
    }
</script>
</body>
</html>
