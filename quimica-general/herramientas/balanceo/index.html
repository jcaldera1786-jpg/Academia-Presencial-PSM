<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reto Balanceo Blindado - Zuforca Academy</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root { --primary: #7b241c; --secondary: #1b4f72; --success: #145a32; --bg: #f4f6f7; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .header { text-align: center; border-bottom: 5px solid var(--primary); margin-bottom: 25px; }
        .stats-bar { display: flex; justify-content: space-around; background: var(--secondary); color: white; padding: 10px; border-radius: 8px; margin-bottom: 20px; }
        .card { border: 2px solid #ddd; padding: 25px; border-radius: 12px; min-height: 380px; text-align: center; }
        .equation-box { font-size: 1.8em; margin: 30px 0; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 10px; color: #1a5276; }
        .coef-input { width: 45px; height: 45px; text-align: center; font-size: 0.8em; border: 2px solid var(--secondary); border-radius: 5px; font-weight: bold; color: #c0392b; }
        .feedback { display: none; padding: 15px; border-radius: 8px; margin-top: 15px; font-weight: bold; text-align: left; }
        .btn-action { background: var(--success); color: white; padding: 12px 30px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        .btn-action:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Desafío: Balanceo Estequiométrico Pro</h1>
        <p>Zuforca Academy | Prof. José Ángel Caldera Luzardo</p>
    </div>

    <div id="setup">
        <input type="text" id="name" placeholder="Nombre Completo" style="width:95%; padding:12px; margin-bottom:10px; border-radius:5px; border:1px solid #ccc;">
        <input type="text" id="cedula" placeholder="Cédula (Solo números)" oninput="this.value = this.value.replace(/[^0-9]/g, '');" style="width:95%; padding:12px; margin-bottom:20px; border-radius:5px; border:1px solid #ccc;">
        <button class="option" onclick="iniciar()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:8px; cursor:pointer; font-size:1.1em;">Iniciar Evaluación Blindada</button>
    </div>

    <div id="quiz" style="display:none;">
        <div class="stats-bar">
            <span>Pregunta: <span id="q-num">1</span>/10</span>
            <span>Acierto: <span id="percent">0</span>%</span>
            <span>Intento: <span id="attempt-num">1</span></span>
        </div>
        <div class="card">
            <h3>Escriba los coeficientes para balancear la ecuación:</h3>
            <p style="color: #666; font-size: 0.9em;">(Si el coeficiente es 1, puede dejarlo en blanco o colocar 1)</p>
            <div id="equation-area" class="equation-box"></div>
            
            <div id="feedback" class="feedback"></div>
            
            <div id="action-area">
                <button id="btn-check" class="btn-action" onclick="verificar()">Verificar Balanceo</button>
                <button id="btn-next" class="btn-action" onclick="siguiente()" style="display:none; background: var(--secondary);">Siguiente →</button>
            </div>
        </div>
    </div>
</div>

<script>
    const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbxyvZ7kq5nwmQzZMyH7l4Fyl3_NpTgARxpbJBO_UQb2g2ihV1mf3TNMJ3dUFv1xh2oqEQ/exec";
    
    let userData = { nombre: "", cedula: "", intento: 1 };
    let correctCount = 0, qIndex = 1, currentAnswer = [];

    const poolReacciones = [
        { ec: ["Li", "O₂", "→", "Li₂O"], coefs: [4, 1, 2], hint: "Ajuste el oxígeno primero." },
        { ec: ["Mg", "HCl", "→", "MgCl₂", "H₂"], coefs: [1, 2, 1, 1], hint: "Revise los subíndices del Cloro." },
        { ec: ["Al", "O₂", "→", "Al₂O₃"], coefs: [4, 3, 2], hint: "Busque el MCM del oxígeno (6)." },
        { ec: ["C₃H₈", "O₂", "→", "CO₂", "H₂O"], coefs: [1, 5, 3, 4], hint: "Combustión: Carbono, Hidrógeno y luego Oxígeno." },
        { ec: ["Fe", "O₂", "→", "Fe₂O₃"], coefs: [4, 3, 2], hint: "Oxidación del hierro (III)." },
        { ec: ["KClO₃", "→", "KCl", "O₂"], coefs: [2, 2, 3], hint: "Descomposición térmica." },
        { ec: ["N₂", "H₂", "→", "NH₃"], coefs: [1, 3, 2], hint: "Proceso Haber." },
        { ec: ["Na", "H₂O", "→", "NaOH", "H₂"], coefs: [2, 2, 2, 1], hint: "Cuidado con el hidrógeno diatómico." },
        { ec: ["P₄", "O₂", "→", "P₄O₁₀"], coefs: [1, 5, 1], hint: "El fósforo blanco es tetratómico." },
        { ec: ["CH₄", "O₂", "→", "CO₂", "H₂O"], coefs: [1, 2, 1, 2], hint: "Balancee el hidrógeno antes que el oxígeno." }
    ];

    function iniciar() {
        const n = document.getElementById('name').value;
        const c = document.getElementById('cedula').value;
        if(!n || !c) return alert("Ingrese sus datos.");
        userData.nombre = n; userData.cedula = c;
        document.getElementById('setup').style.display = 'none';
        document.getElementById('quiz').style.display = 'block';
        cargar();
    }

    function cargar() {
        const r = poolReacciones[Math.floor(Math.random()*poolReacciones.length)];
        currentAnswer = r.coefs;
        const area = document.getElementById('equation-area');
        area.innerHTML = "";
        
        let coefIdx = 0;
        r.ec.forEach((part) => {
            if (part === "→" || part === "+") {
                area.innerHTML += `<span>${part === "→" ? " → " : " + "}</span>`;
            } else {
                area.innerHTML += `<input type="text" class="coef-input" id="c${coefIdx}" placeholder="1">`;
                area.innerHTML += `<span>${part}</span>`;
                if(coefIdx < r.ec.filter(p => p!=="→" && p!=="+").length - 1 && r.ec[r.ec.indexOf(part)+1] !== "→") {
                   // No añadir plus aquí, ya está en el array ec si lo deseamos o lo manejamos manual
                }
                coefIdx++;
            }
        });

        document.getElementById('feedback').style.display = 'none';
        document.getElementById('btn-check').style.display = 'inline-block';
        document.getElementById('btn-next').style.display = 'none';
    }

    function verificar() {
        let studentAnswers = [];
        for(let i=0; i < currentAnswer.length; i++) {
            let val = document.getElementById(`c${i}`).value.trim();
            studentAnswers.push(val === "" ? 1 : parseInt(val));
        }

        const isCorrect = JSON.stringify(studentAnswers) === JSON.stringify(currentAnswer);
        const fb = document.getElementById('feedback');
        fb.style.display = 'block';
        
        if(isCorrect) {
            fb.innerHTML = "✅ ¡Perfecto! La ecuación cumple con la Ley de Conservación de la Masa.";
            fb.style.background = "#d4edda";
            correctCount++;
        } else {
            fb.innerHTML = `❌ Incorrecto. Los coeficientes correctos son: [${currentAnswer.join(', ')}].`;
            fb.style.background = "#f8d7da";
        }

        document.getElementById('percent').innerText = ((correctCount/qIndex)*100).toFixed(0);
        document.getElementById('btn-check').style.display = 'none';
        document.getElementById('btn-next').style.display = 'inline-block';
        document.querySelectorAll('.coef-input').forEach(input => input.disabled = true);
    }

    function siguiente() {
        if(qIndex < 10) {
            qIndex++;
            document.getElementById('q-num').innerText = qIndex;
            cargar();
        } else {
            prepararEnvio();
        }
    }

    function prepararEnvio() {
        const finalP = ((correctCount/10)*100).toFixed(0);
        document.getElementById('action-area').innerHTML = `<button id="btn-send" class="btn-action" onclick="enviar(${finalP})">Enviar Informe a la Nube</button>`;
    }

    async function enviar(p) {
        const btn = document.getElementById('btn-send');
        btn.disabled = true;
        btn.innerText = "Enviando...";

        const data = {
            nombre: userData.nombre,
            cedula: userData.cedula,
            puntos: p,
            intento: userData.intento
        };

        try {
            // Usando un formulario oculto para evitar bloqueos de CORS en algunos navegadores
            const form = new FormData();
            for (const key in data) { form.append(key, data[key]); }

            await fetch(GOOGLE_URL, {
                method: 'POST',
                mode: 'no-cors', // Importante para Google Apps Script
                body: JSON.stringify(data)
            });

            alert("SISTEMA: Informe enviado con éxito.");
            document.getElementById('action-area').innerHTML = `<button class="btn-action" onclick="reintentar()" style="background:var(--secondary)">Nuevo Intento</button>`;
        } catch (e) {
            alert("Error al enviar. Revise su conexión.");
            btn.disabled = false;
            btn.innerText = "Reintentar Envío";
        }
    }

    function reintentar() {
        userData.intento++;
        correctCount = 0; qIndex = 1;
        document.getElementById('percent').innerText = "0";
        document.getElementById('q-num').innerText = "1";
        document.getElementById('attempt-num').innerText = userData.intento;
        document.getElementById('action-area').innerHTML = `<button id="btn-check" class="btn-action" onclick="verificar()">Verificar Balanceo</button><button id="btn-next" class="btn-action" onclick="siguiente()" style="display:none;">Siguiente →</button>`;
        cargar();
    }
</script>
</body>
</html>
