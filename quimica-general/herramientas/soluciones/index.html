<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZUFORCA: Simulador de Ingeniería</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            background: url('fondo-soluciones.png') no-repeat center center fixed;
            background-size: cover;
        }

        /* Restaurado el efecto Glassmorphism Original */
        .glass-panel {
            background: rgba(255, 255, 255, 0.1); /* Transparencia clara original */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 25px;
            width: 90%;
            max-width: 500px;
            color: white;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .header { 
            display: flex; 
            justify-content: space-between; 
            font-size: 0.8em; 
            border-bottom: 1px solid rgba(255,255,255,0.3); 
            padding-bottom: 10px; 
            margin-bottom: 15px; 
        }
        
        .problem-text { 
            font-size: 1.1em; 
            margin-bottom: 20px; 
            line-height: 1.5; 
            background: rgba(0,0,0,0.2); 
            padding: 15px; 
            border-radius: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5); /* Sutil sombra para leer sobre el brillo */
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9em;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        textarea, input {
            width: 100%; 
            background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 10px; 
            color: white; 
            padding: 12px; 
            box-sizing: border-box; 
            margin-bottom: 15px; 
            font-size: 1em;
        }

        textarea { height: 80px; resize: none; }

        button {
            width: 100%; 
            padding: 15px; 
            border-radius: 10px; 
            border: none;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5); 
            color: white;
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s;
        }

        button:hover { 
            transform: scale(1.02); 
            box-shadow: 0 0 15px #00d2ff; 
        }

        .feedback { 
            margin-top: 15px; 
            padding: 10px; 
            border-radius: 8px; 
            font-size: 0.9em; 
            display: none; 
            text-align: center;
        }
    </style>
</head>
<body>

<div class="glass-panel">
    <div class="header">
        <span>RACHA: <b id="racha">0</b>/5</span>
        <span id="modulo-txt">MÓDULO: CARGANDO...</span>
    </div>

    <div id="enunciado" class="problem-text">Inicializando reactor...</div>

    <label>Análisis Lógico (Procedimiento):</label>
    <textarea id="logic"></textarea>

    <label>Resultado Final (Gramos):</label>
    <input type="number" id="valor" step="0.01">

    <button onclick="evaluar()">EVALUAR MI LÓGICA</button>

    <div id="feedback" class="feedback"></div>
</div>

<script>
    const MODULO_ACTIVO = 2; 

    let racha = 0;
    let meta = 0;

    const DB = {
        acidos: [
            {n:"H_2SO_4", mm:98.08}, 
            {n:"HCl", mm:36.46},
            {n:"HNO_3", mm:63.01}
        ],
        bases: [
            {n:"NaOH", mm:40.00}, 
            {n:"Al(OH)_3", mm:78.00},
            {n:"KOH", mm:56.11}
        ]
    };

    function generar() {
        document.getElementById('feedback').style.display = "none";
        document.getElementById('valor').value = "";
        document.getElementById('logic').value = "";
        
        let txt = "";
        if (MODULO_ACTIVO === 2) {
            document.getElementById('modulo-txt').innerText = "UNIDADES QUÍMICAS";
            const a = DB.acidos[Math.floor(Math.random()*DB.acidos.length)];
            const vol = (Math.random()*750 + 250).toFixed(0);
            const molaridad = (Math.random()*1.2 + 0.1).toFixed(2);
            
            meta = (molaridad * (vol/1000) * a.mm).toFixed(2);
            
            txt = `Se requiere preparar una solución de $${a.n}$. Calcule cuántos gramos del soluto son necesarios para obtener <b>${vol} ml</b> a una concentración <b>${molaridad} M</b>.`;
        } 

        document.getElementById('enunciado').innerHTML = txt;
        if(window.MathJax) MathJax.typeset();
    }

    function evaluar() {
        const val = parseFloat(document.getElementById('valor').value);
        const log = document.getElementById('logic').value.toLowerCase();
        const fb = document.getElementById('feedback');
        
        fb.style.display = "block";
        const numOk = Math.abs(val - meta) < (meta * 0.05);
        const logicOk = log.length > 15;

        if(numOk && logicOk) {
            racha++;
            fb.style.background = "rgba(46, 204, 113, 0.4)";
            fb.innerHTML = "<b>¡Excelente!</b> Procedimiento validado.";
            setTimeout(generar, 2500);
        } else {
            racha = 0;
            fb.style.background = "rgba(231, 76, 60, 0.4)";
            fb.innerHTML = `<b>Error:</b> Revise sus cálculos. Valor esperado: ~${meta}g`;
        }
        
        document.getElementById('racha').innerText = racha;
    }

    window.onload = generar;
</script>
</body>
</html>
