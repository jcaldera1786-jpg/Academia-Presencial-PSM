<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZUFORCA: Simulador de Ingeniería</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            background: url('fondo-soluciones.png') no-repeat center center fixed;
            background-size: cover;
        }

        .glass-panel {
            background: rgba(0, 0, 0, 0.6); /* Oscurecido para legibilidad */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            width: 90%;
            max-width: 500px;
            color: white;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.6);
        }

        .header { 
            display: flex; 
            justify-content: space-between; 
            font-size: 0.85em; 
            border-bottom: 1px solid rgba(255,255,255,0.3); 
            padding-bottom: 10px; 
            margin-bottom: 15px; 
            font-weight: bold;
        }
        
        .problem-text { 
            font-size: 1.15em; 
            margin-bottom: 20px; 
            line-height: 1.5; 
            background: rgba(0,0,0,0.3); 
            padding: 15px; 
            border-radius: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9em;
            font-weight: 600;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        textarea, input {
            width: 100%; 
            background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 10px; 
            color: white; 
            padding: 12px; 
            box-sizing: border-box; 
            margin-bottom: 15px; 
            font-size: 1em;
            outline: none;
        }

        textarea { height: 80px; resize: none; }

        button {
            width: 100%; 
            padding: 15px; 
            border-radius: 10px; 
            border: none;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5); 
            color: white;
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover { 
            transform: scale(1.02); 
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.6); 
        }

        .feedback { 
            margin-top: 15px; 
            padding: 12px; 
            border-radius: 8px; 
            font-size: 0.95em; 
            display: none; 
            text-align: center;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="glass-panel">
    <div class="header">
        <span>RACHA: <b id="racha">0</b>/5</span>
        <span id="modulo-txt">CARGANDO...</span>
    </div>

    <div id="enunciado" class="problem-text">Inicializando sistema...</div>

    <label>Análisis Lógico (Procedimiento):</label>
    <textarea id="logic"></textarea>

    <label>Resultado Final (Molaridad):</label>
    <input type="number" id="valor" step="0.0001">

    <button onclick="evaluar()">Evaluar Ingeniería</button>

    <div id="feedback" class="feedback"></div>
</div>

<script>
    // --- CONFIGURACIÓN DEL PROFESOR ---
    const MODULO_ACTIVO = 2; 
    // ----------------------------------

    let racha = 0;
    let meta = 0;

    const DB = {
        acidos: [
            {n:"H2SO4", mm:98.08, p:2}, 
            {n:"HCl", mm:36.46, p:1},
            {n:"HNO3", mm:63.01, p:1}
        ],
        bases: [
            {n:"NaOH", mm:40.00, oh:1}, 
            {n:"Al(OH)3", mm:78.00, oh:3},
            {n:"KOH", mm:56.11, oh:1}
        ]
    };

    function generar() {
        document.getElementById('feedback').style.display = "none";
        document.getElementById('valor').value = "";
        document.getElementById('logic').value = "";
        
        let txt = "";
        
        if (MODULO_ACTIVO === 2) {
            document.getElementById('modulo-txt').innerText = "UNIDADES QUÍMICAS";
            const a = DB.acidos[Math.floor(Math.random()*DB.acidos.length)];
            const vol = (Math.random()*750 + 250).toFixed(0);
            const molaridad = (Math.random()*1.2 + 0.1).toFixed(2);
            
            // Calculamos la masa necesaria como meta real
            meta = (molaridad * (vol/1000) * a.mm).toFixed(2);
            
            txt = `Se requiere preparar una solución de <b>${a.n}</b>. Calcule cuántos gramos del soluto son necesarios para obtener <b>${vol} ml</b> a una concentración <b>${molaridad} M</b>.`;
        } 

        document.getElementById('enunciado').innerHTML = txt;
        if(window.MathJax) MathJax.typeset();
    }

    function evaluar() {
        const val = parseFloat(document.getElementById('valor').value);
        const log = document.getElementById('logic').value.toLowerCase();
        const fb = document.getElementById('feedback');
        
        fb.style.display = "block";
        const numOk = Math.abs(val - meta) < (meta * 0.05); // 5% tolerancia
        const logicOk = log.length > 15 && (log.includes("mol") || log.includes("masa") || log.includes("peso"));

        if(numOk && logicOk) {
            racha++;
            fb.style.background = "rgba(46, 204, 113, 0.4)";
            fb.style.color = "#fff";
            fb.innerHTML = "<b>CORRECTO:</b> Procedimiento y cálculos validados.";
            setTimeout(generar, 2500);
        } else {
            racha = 0;
            fb.style.background = "rgba(231, 76, 60, 0.4)";
            fb.style.color = "#fff";
            fb.innerHTML = `<b>FALLO:</b> Verifique su estequiometría. El valor era aprox: ${meta}g`;
        }
        
        document.getElementById('racha').innerText = racha;
    }

    window.onload = generar;
</script>
</body>
</html>
