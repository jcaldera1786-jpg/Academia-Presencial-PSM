<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZUFORCA: Simulador de Ingeniería</title>
    
    <!-- CARGA DE LIBRERÍAS (Versión Robusta) -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root {
            --glass-bg: rgba(15, 25, 35, 0.75);
            --accent-blue: #3498db;
        }

        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0f14 url('https://jcaldera1786-jpg.github.io/Academia-Presencial-PSM/quimica-general/herramientas/soluciones/fondo-soluciones.png') no-repeat center center fixed;
            background-size: cover;
            color: white;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 25px;
            padding: 35px;
            width: 90%;
            max-width: 550px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .header { 
            display: flex; justify-content: space-between; 
            font-size: 0.85em; border-bottom: 1px solid rgba(255,255,255,0.1); 
            padding-bottom: 15px; margin-bottom: 20px;
            text-transform: uppercase; letter-spacing: 1px; font-weight: bold;
        }
        
        .problem-text { 
            font-size: 1.15em; line-height: 1.6;
            background: rgba(255,255,255,0.05); 
            padding: 20px; border-radius: 15px; margin-bottom: 25px;
            border-left: 5px solid var(--accent-blue);
        }

        .highlight { color: #00d2ff; font-weight: bold; }

        label { display: block; margin-bottom: 8px; font-size: 0.9em; color: #bbb; font-weight: 600; }

        input, textarea {
            width: 100%; background: rgba(255,255,255,0.07); 
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px; color: white; padding: 14px; 
            box-sizing: border-box; margin-bottom: 20px; font-size: 1em;
            outline: none; transition: 0.3s;
        }

        input:focus, textarea:focus { 
            border: 2px solid var(--accent-blue); 
            background: rgba(255,255,255,0.12);
            box-shadow: 0 0 10px rgba(52, 152, 219, 0.5);
        }

        button {
            width: 100%; padding: 16px; border-radius: 12px; border: none;
            background: var(--accent-blue); color: white;
            font-weight: bold; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .feedback { 
            margin-top: 20px; padding: 15px; border-radius: 12px; 
            text-align: center; font-weight: 500; display: none;
        }
    </style>
</head>
<body>

<div class="glass-panel">
    <div id="pantalla-registro">
        <h2 style="text-align:center;">ZUFORCA</h2>
        <p style="text-align:center; color:#aaa;">Módulo de Ingeniería Química</p>
        <label>Nombre del Estudiante:</label>
        <input type="text" id="user-name">
        <label>Cédula:</label>
        <input type="text" id="user-id">
        <button onclick="iniciar()">ACTIVAR REACTOR</button>
    </div>

    <div id="pantalla-ejercicio" style="display:none;">
        <div class="header">
            <span id="display-id">ID: ---</span>
            <span>RACHA: <b id="racha">0</b>/5</span>
        </div>
        <div id="enunciado" class="problem-text"></div>
        <label>ANÁLISIS LÓGICO:</label>
        <textarea id="logic" rows="3"></textarea>
        <label>GRAMOS:</label>
        <input type="number" id="valor" step="0.01">
        <button onclick="evaluar()">EVALUAR</button>
        <div id="feedback" class="feedback"></div>
    </div>
</div>

<script>
    let racha = 0, meta = 0;
    const DB = {
        acidos: [
            {n:"H_2SO_4", mm:98.08}, {n:"HCl", mm:36.46},
            {n:"HNO_3", mm:63.01}, {n:"NaOH", mm:40.00}
        ]
    };

    function iniciar() {
        if(document.getElementById('user-id').value.length > 4) {
            document.getElementById('display-id').innerText = "ID: " + document.getElementById('user-id').value;
            document.getElementById('pantalla-registro').style.display = 'none';
            document.getElementById('pantalla-ejercicio').style.display = 'block';
            generar();
        }
    }

    function generar() {
        const comp = DB.acidos[Math.floor(Math.random()*DB.acidos.length)];
        const vol = (Math.random()*800 + 200).toFixed(0);
        const molaridad = (Math.random()*0.9 + 0.1).toFixed(2);
        meta = (molaridad * (vol/1000) * comp.mm).toFixed(2);
        
        // Cambio clave: Usamos \( \) en lugar de $ para máxima compatibilidad
        document.getElementById('enunciado').innerHTML = `Prepare una solución de <span class='highlight'>\\(${comp.n}\\)</span>. Calcule los <span class='highlight'>gramos</span> para <span class='highlight'>${vol} ml</span> a <span class='highlight'>${molaridad} M</span>.`;
        
        document.getElementById('valor').value = "";
        document.getElementById('feedback').style.display = "none";

        // Forzamos el renderizado manual
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
    }

    function evaluar() {
        const val = parseFloat(document.getElementById('valor').value);
        const fb = document.getElementById('feedback');
        fb.style.display = "block";

        if(Math.abs(val - meta) < (meta * 0.1)) {
            racha++;
            fb.style.background = "rgba(46, 204, 113, 0.4)";
            fb.innerHTML = "¡CORRECTO! Reactor estable.";
            setTimeout(generar, 2000);
        } else {
            racha = 0;
            fb.style.background = "rgba(231, 76, 60, 0.4)";
            fb.innerHTML = "REVISA: El valor era ~" + meta + "g. Reiniciando racha.";
        }
        document.getElementById('racha').innerText = racha;
    }
</script>
</body>
</html>
