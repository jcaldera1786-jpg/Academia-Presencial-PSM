<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZUFORCA: Módulo de Ingeniería</title>
    
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root {
            --glass-bg: rgba(10, 20, 30, 0.6); 
            --accent-blue: #3498db;
            --success: #2ecc71;
            --gold: #f1c40f;
        }

        body {
            margin: 0; min-height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-family: 'Segoe UI', sans-serif;
            background: #0a0f14 url('https://jcaldera1786-jpg.github.io/Academia-Presencial-PSM/quimica-general/herramientas/soluciones/fondo-soluciones.png') no-repeat center center fixed;
            background-size: cover; color: white;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px; padding: 35px;
            width: 90%; max-width: 550px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
        }

        .problem-text { 
            background: rgba(255,255,255,0.08); padding: 18px; 
            border-radius: 12px; margin: 15px 0; border-left: 5px solid var(--accent-blue);
        }

        .instrucciones {
            font-size: 0.85em; color: #ccc; margin-bottom: 15px; font-style: italic;
        }

        input, textarea {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px; color: white; padding: 12px; margin-bottom: 12px; box-sizing: border-box;
        }

        button {
            width: 100%; padding: 15px; border-radius: 8px; border: none;
            background: var(--accent-blue); color: white; font-weight: bold; cursor: pointer;
            text-transform: uppercase;
        }

        .footer-credits {
            margin-top: 20px; font-size: 0.75em; color: rgba(255,255,255,0.6); text-align: center;
        }

        #final-screen { text-align: center; display: none; }
    </style>
</head>
<body>

<div class="glass-panel">
    <!-- REGISTRO -->
    <div id="registro">
        <h2 style="text-align:center; margin-bottom:5px;">ZUFORCA</h2>
        <p style="text-align:center; color:var(--gold); font-size:0.9em; margin-bottom:25px;">SISTEMA DE EVALUACIÓN CONTINUA</p>
        <label>Nombre:</label>
        <input type="text" id="user-name">
        <label>Cédula:</label>
        <input type="text" id="user-id">
        <button onclick="iniciar()">ACTIVAR SIMULADOR</button>
    </div>

    <!-- SIMULADOR -->
    <div id="simulador" style="display:none;">
        <div style="display:flex; justify-content:space-between; font-size:0.8em; opacity:0.8;">
            <span id="label-estudiante"></span>
            <span>RACHA: <b id="racha-total" style="color:var(--gold);">0</b>/10</span>
        </div>
        <div id="enunciado" class="problem-text"></div>
        
        <p class="instrucciones">Debe describir el procedimiento lógico para llegar a la solución y colocar el valor final en el cuadro numérico.</p>
        
        <label>Análisis del Procedimiento:</label>
        <textarea id="logic" rows="3" placeholder="Ej: despeje de masa, cálculo de moles..."></textarea>
        
        <label>Resultado Final (Gramos):</label>
        <input type="number" id="valor" step="0.01">
        
        <button onclick="evaluar()">ENVIAR PARA ANÁLISIS</button>
        <div style="text-align:center; font-size:0.7em; margin-top:10px;">EJERCICIO <span id="progreso">1</span> DE 8</div>
    </div>

    <!-- PANTALLA FINAL -->
    <div id="final-screen">
        <h3 id="resultado-titulo"></h3>
        <p id="resultado-detalle"></p>
        <div id="mensaje-racha" style="margin:15px 0;"></div>
        <button onclick="siguienteIntento()">INICIAR NUEVO CICLO</button>
    </div>
</div>

<div class="footer-credits">
    Herramienta de <b>ZUFORCA</b> | Diseño Pedagógico y Dirección: <b>Dr. José Ángel Caldera L.</b>
</div>

<script>
    let ejercicioActual = 1;
    let aciertosIntento = 0;
    let rachaPerfecta = 0;
    let metaVal = 0;
    let historial = {};
    const totalProblemas = 8;
    const datosUser = { nombre: "", id: "" };

    const DB = [
        {n:"H_2SO_4", mm:98.08}, {n:"HCl", mm:36.46}, {n:"HNO_3", mm:63.01}, 
        {n:"NaOH", mm:40.00}, {n:"KOH", mm:56.10}, {n:"CH_3COOH", mm:60.05}
    ];

    function iniciar() {
        const n = document.getElementById('user-name').value;
        const i = document.getElementById('user-id').value;
        if(n && i) {
            datosUser.nombre = n; datosUser.id = i;
            document.getElementById('label-estudiante').innerText = i;
            document.getElementById('registro').style.display = 'none';
            document.getElementById('simulador').style.display = 'block';
            generar();
        }
    }

    function generar() {
        let candidatos = DB.filter(a => (historial[a.n] || 0) < 2);
        if (candidatos.length === 0) { historial = {}; candidatos = DB; }
        
        const comp = candidatos[Math.floor(Math.random()*candidatos.length)];
        historial[comp.n] = (historial[comp.n] || 0) + 1;

        const vol = (Math.random()*750 + 250).toFixed(0);
        const molaridad = (Math.random()*0.8 + 0.2).toFixed(2);
        metaVal = (molaridad * (vol/1000) * comp.mm).toFixed(2);
        
        document.getElementById('enunciado').innerHTML = `Prepare <b style="color:var(--accent-blue);">${vol} ml</b> de una solución de <b style="color:var(--accent-blue);">\\(${comp.n}\\)</b> a <b style="color:var(--accent-blue);">${molaridad} M</b>.`;
        document.getElementById('valor').value = "";
        document.getElementById('logic').value = "";
        document.getElementById('progreso').innerText = ejercicioActual;

        if (window.MathJax) MathJax.typesetPromise();
    }

    function evaluar() {
        const val = parseFloat(document.getElementById('valor').value);
        if(Math.abs(val - metaVal) < (metaVal * 0.05)) aciertosIntento++;

        if(ejercicioActual < totalProblemas) {
            ejercicioActual++;
            generar();
        } else {
            finalizar();
        }
    }

    function finalizar() {
        document.getElementById('simulador').style.display = 'none';
        document.getElementById('final-screen').style.display = 'block';
        const porc = (aciertosIntento/totalProblemas)*100;
        
        if(porc === 100) {
            rachaPerfecta++;
            document.getElementById('resultado-titulo').innerText = "¡EXCELENCIA!";
            document.getElementById('mensaje-racha').innerHTML = `Racha: <b>${rachaPerfecta}/10</b>`;
        } else {
            rachaPerfecta = 0;
            document.getElementById('resultado-titulo').innerText = "PRECISIÓN INSUFICIENTE";
            document.getElementById('mensaje-racha').innerText = "Racha reiniciada.";
        }
        document.getElementById('resultado-detalle').innerText = `Aciertos: ${aciertosIntento}/${totalProblemas}`;
        document.getElementById('racha-total').innerText = rachaPerfecta;
    }

    function siguienteIntento() {
        ejercicioActual = 1; aciertosIntento = 0;
        document.getElementById('final-screen').style.display = 'none';
        document.getElementById('simulador').style.display = 'block';
        generar();
    }
</script>
</body>
</html>
