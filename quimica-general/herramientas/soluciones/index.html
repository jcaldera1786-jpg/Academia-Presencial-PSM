<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZUFORCA: Simulador de Ingeniería</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            background: url('fondo-soluciones.png') no-repeat center center fixed;
            background-size: cover;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 30px;
            width: 85%; /* Panel más ancho como en el original */
            max-width: 800px;
            color: white;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .header { 
            display: flex; 
            justify-content: space-between; 
            font-size: 0.9em; 
            border-bottom: 1px solid rgba(255,255,255,0.3); 
            padding-bottom: 10px; 
            margin-bottom: 20px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .problem-text { 
            font-size: 1.2em; 
            margin-bottom: 25px; 
            line-height: 1.6; 
            background: rgba(0,0,0,0.15); 
            padding: 20px; 
            border-radius: 10px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
        }

        textarea, input {
            width: 100%; 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 5px; 
            color: white; 
            padding: 15px; 
            box-sizing: border-box; 
            margin-bottom: 20px; 
            font-size: 1.1em;
            outline: none;
        }

        textarea { height: 100px; resize: none; }

        button {
            width: 100%; 
            padding: 18px; 
            border-radius: 5px; 
            border: 1px solid rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.1); 
            color: white;
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover { 
            background: rgba(255,255,255,0.2);
            box-shadow: 0 0 15px rgba(255,255,255,0.3); 
        }

        .feedback { 
            margin-top: 20px; 
            padding: 15px; 
            border-radius: 5px; 
            display: none; 
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="glass-panel">
    <div class="header">
        <span id="modulo-txt">MÓDULO: UNIDADES QUÍMICAS</span>
        <span>RACHA: <b id="racha">0</b> / 5</span>
    </div>

    <div id="enunciado" class="problem-text">Generando reto de ingeniería...</div>

    <label>COMENTARIO / ANÁLISIS DE LA IA:</label>
    <textarea id="logic"></textarea>

    <label>RESPUESTA FINAL (NÚMERO):</label>
    <input type="number" id="valor" step="0.01">

    <button onclick="evaluar()">EVALUAR MI LÓGICA</button>

    <div id="feedback" class="feedback"></div>
</div>

<script>
    const MODULO_ACTIVO = 2; 
    let racha = 0;
    let meta = 0;

    const DB = {
        acidos: [
            {n:"H_2SO_4", mm:98.08}, 
            {n:"HCl", mm:36.46},
            {n:"HNO_3", mm:63.01}
        ]
    };

    function generar() {
        document.getElementById('feedback').style.display = "none";
        document.getElementById('valor').value = "";
        document.getElementById('logic').value = "";
        
        const a = DB.acidos[Math.floor(Math.random()*DB.acidos.length)];
        const vol = (Math.random()*750 + 250).toFixed(0);
        const molaridad = (Math.random()*1.2 + 0.1).toFixed(2);
        
        meta = (molaridad * (vol/1000) * a.mm).toFixed(2);
        
        const txt = `PROBLEMA: Se requiere preparar una solución de $${a.n}$. Determine cuántos gramos de soluto se necesitan para obtener <b>${vol} ml</b> a una concentración de <b>${molaridad} M</b>.`;
        
        document.getElementById('enunciado').innerHTML = txt;
        if(window.MathJax) {
            MathJax.typesetPromise();
        }
    }

    function evaluar() {
        const val = parseFloat(document.getElementById('valor').value);
        const log = document.getElementById('logic').value.toLowerCase();
        const fb = document.getElementById('feedback');
        
        fb.style.display = "block";
        const numOk = Math.abs(val - meta) < (meta * 0.05);

        if(numOk && log.length > 10) {
            racha++;
            fb.style.background = "rgba(0, 255, 150, 0.2)";
            fb.innerHTML = "SISTEMA VALIDADO: Procedimiento correcto.";
            setTimeout(generar, 2500);
        } else {
            racha = 0;
            fb.style.background = "rgba(255, 0, 0, 0.2)";
            fb.innerHTML = `ERROR: Verifique sus cálculos. Valor esperado: ~${meta}g`;
        }
        
        document.getElementById('racha').innerText = racha;
    }

    window.onload = generar;
</script>
</body>
</html>
